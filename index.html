<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kaabo Dash Vertical</title>
    <style>
        /* Optimisation Plein Écran */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100svh; 
            background: #000; overflow: hidden; overscroll-behavior: none;
            font-family: -apple-system, sans-serif; color: white;
        }

        #map { position: absolute; inset: 0; z-index: 1; }

        /* Cartouche Supérieure Noire */
        #top-bar {
            position: absolute; top: 15px; left: 12px; right: 12px; height: 110px; z-index: 10;
            background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 20px; display: grid; grid-template-columns: 1fr 1.2fr 1fr; align-items: center; 
            text-align: center; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        #speed-val { font-size: 52px; font-weight: 900; color: #ff0000; display: block; line-height: 0.9; }
        .label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
        .val { font-size: 19px; font-weight: bold; color: #fff; }

        /* Bouton Reset Discret */
        .reset-btn {
            background: #222; color: #666; border: none; border-radius: 6px; 
            font-size: 9px; padding: 3px 8px; margin-top: 5px; font-weight: bold;
        }
        .reset-btn:active { background: #ff0000; color: white; }

        /* Écran de démarrage - RESTAURATION LOGO */
        #start-screen { 
            position: fixed; inset: 0; background: #000; z-index: 2000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .main-logo {
            width: 280px; /* Taille généreuse pour le logo d'entrée */
            height: auto;
            margin-bottom: 40px; /* Espace avant le bouton */
        }
        #start-btn { 
            padding: 22px 60px; background: #ff0000; color: white; border: none; 
            border-radius: 50px; font-size: 22px; font-weight: 900; cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
        }

        /* Modal Météo */
        #weather-modal { 
            display: none; position: fixed; inset: 0; z-index: 3000; 
            background: rgba(0,0,0,0.95); align-items: center; justify-content: center; 
        }
        .modal-content { background: #111; padding: 25px; border-radius: 25px; width: 80%; border: 1px solid #ff0000; text-align: center; }
    </style>
</head>
<body>

    <div id="start-screen">
        <img src="logo-kaboo.png" alt="KAABO" class="main-logo" onerror="this.style.display='none'; document.getElementById('logo-text-fallback').style.display='block';">
        
        <h1 id="logo-text-fallback" style="color:#ff0000; display:none; letter-spacing: 12px; font-size: 45px; margin-bottom: 30px;">KAABO</h1>
        
        <button id="start-btn" onclick="startApp()">DÉMARRER</button>
    </div>

    <div id="top-bar">
        <div onclick="openWeather()" style="cursor:pointer;">
            <div class="label">Météo</div>
            <div id="temp-val" class="val">--°</div>
        </div>
        <div>
            <span id="speed-val">0</span>
            <div class="label">KM/H</div>
        </div>
        <div>
            <div class="label">Trip</div>
            <div id="odo-val" class="val">0.00</div>
            <button class="reset-btn" onclick="resetOdo()">RESET</button>
        </div>
    </div>

    <div id="weather-modal" onclick="closeWeather()">
