<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kaabo Google Dashboard</title>
    
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Arial Black', sans-serif; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        
        /* Widgets */
        .widget {
            position: absolute; z-index: 10; background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px); padding: 10px; border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-align: center;
        }

        #main-dash { min-width: 130px; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        #logo-kaabo { width: 80px; height: auto; }
        #speed-val { font-size: 52px; font-weight: 900; color: #ff0000; line-height: 0.9; }

        @media (orientation: portrait) {
            #main-dash { top: 20px; left: 50%; transform: translateX(-50%); }
            #weather { top: 20px; left: 15px; }
            #elevation { bottom: 120px; left: 15px; }
        }
        @media (orientation: landscape) {
            #main-dash { top: 15px; right: 15px; }
            #weather { top: 15px; left: 15px; }
            #elevation { bottom: 25px; left: 15px; }
        }

        /* Écran de démarrage */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #start-btn {
            padding: 20px 50px; background: #ff0000; color: white;
            border: none; border-radius: 5px; font-size: 20px; font-weight: bold; cursor: pointer;
        }

        #recenter-btn {
            position: absolute; bottom: 30px; right: 20px; z-index: 20;
            width: 60px; height: 60px; background: #ff0000; border: 2px solid white;
            border-radius: 50%; color: white; font-size: 28px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <img src="logo-kaboo.png" style="width:180px; margin-bottom:40px;" onerror="this.style.display='none'">
        <button id="start-btn" onclick="startApp()">DÉMARRER</button>
    </div>

    <div id="weather" class="widget">☀️ <span id="temp-val">--</span>°C</div>

    <div id="main-dash" class="widget">
        <img src="logo-kaboo.png" id="logo-kaabo" alt="Logo" onerror="this.style.display='none'">
        <span id="speed-val">0</span>
        <span style="font-size: 11px; font-weight: 800;">KM/H</span>
    </div>

    <div id="elevation" class="widget">
        <span style="font-size: 9px; color:#666; display:block; font-weight: bold;">ALTITUDE</span>
        <span id="alt-val">--</span> m
    </div>

    <button id="recenter-btn" onclick="recenter()">🎯</button>
    <div id="map"></div>

    <script>
        let map;
        let marker;
        let userPos = { lat: 48.8566, lng: 2.3522 };
        let isLocked = true;

        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                center: userPos,
                zoom: 18,
                heading: 0,
                tilt: 45,
                mapId: "90f87356969d889", // Nécessaire pour la rotation/inclinaison
                disableDefaultUI: true,
                gestureHandling: "greedy"
            });

            marker = new google.maps.Marker({
                position: userPos,
                map: map,
                icon: {
                    path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW,
                    scale: 6,
                    fillColor: "#ff0000",
                    fillOpacity: 1,
                    strokeWeight: 2,
                    strokeColor: "#ffffff",
                    rotation: 0
                }
            });
        }

        async function startApp() {
            // Plein écran
            const doc = document.documentElement;
            if (doc.requestFullscreen) doc.requestFullscreen();
            else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();

            // Permissions Boussole (iOS)
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                const res = await DeviceOrientationEvent.requestPermission();
                if (res === 'granted') window.addEventListener('deviceorientation', handleRotation, true);
            } else {
                window.addEventListener('deviceorientation', handleRotation, true);
            }

            document.getElementById('start-screen').style.display = 'none';
            activateGPS();
        }

        function handleRotation(e) {
            let heading = e.webkitCompassHeading || (360 - e.alpha);
            if (heading && isLocked && map) {
                map.setHeading(heading);
                const icon = marker.getIcon();
                icon.rotation = heading;
                marker.setIcon(icon);
            }
        }

        function activateGPS() {
            navigator.geolocation.watchPosition((p) => {
                userPos = { lat: p.coords.latitude, lng: p.coords.longitude };
                marker.setPosition(userPos);
                
                if (isLocked) map.setCenter(userPos);
                
                document.getElementById('speed-val').innerText = Math.round((p.coords.speed || 0) * 3.6);
                if (p.coords.altitude !== null) document.getElementById('alt-val').innerText = Math.round(p.coords.altitude);
                fetchWeather();
            }, null, { enableHighAccuracy: true });
        }

        async function fetchWeather() {
            try {
                const res = await fetch(`https://open-meteo.com{userPos.lat}&longitude=${userPos.lng}&current_weather=true`);
                const data = await res.json();
                document.getElementById('temp-val').innerText = Math.round(data.current_weather.temperature);
            } catch (e) {}
        }

        function recenter() {
            isLocked = true;
            map.setCenter(userPos);
            map.setZoom(18);
            map.setTilt(45);
        }

        google.maps.event.addListener(map, 'dragstart', function() { isLocked = false; });
    </script>
    
    <!-- REMPLACER PAR TA CLÉ API GOOGLE MAPS -->
    <script src="https://googleapis.com" async defer></script>
</body>
</html>
