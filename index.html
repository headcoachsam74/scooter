<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kaabo Dashboard Pro</title>
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; }
        
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; background: #222; }
        
        .widget { 
            position: absolute; z-index: 10; 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(10px); 
            padding: 12px; border-radius: 18px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.4); 
            text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
        }

        #main-dash { min-width: 140px; top: 20px; left: 50%; transform: translateX(-50%); }
        #speed-val { font-size: 55px; font-weight: 900; color: #ff0000; display: block; line-height: 1; }
        
        #weather { top: 20px; left: 15px; font-weight: bold; }
        #elevation { bottom: 40px; left: 15px; font-weight: bold; }

        #lock-btn { 
            position: absolute; bottom: 40px; right: 15px; z-index: 100;
            width: 60px; height: 60px; border-radius: 30px;
            background: #ff0000; color: white; border: none;
            font-size: 24px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
        }

        #start-screen { 
            position: fixed; inset: 0; background: #000; z-index: 2000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        #start-btn { 
            padding: 20px 60px; background: #ff0000; color: white; border: none; 
            border-radius: 50px; font-size: 22px; font-weight: bold; cursor: pointer;
        }

        @media (orientation: landscape) {
            #main-dash { top: 15px; right: 15px; left: auto; transform: none; }
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 style="color:white; letter-spacing: 5px; margin-bottom: 30px;">KAABO PRO</h1>
        <button id="start-btn" onclick="startApp()">DÉMARRER</button>
    </div>

    <div id="weather" class="widget">☀️ <span id="temp-val">--</span>°C</div>

    <div id="main-dash" class="widget">
        <span id="speed-val">0</span>
        <span style="font-size: 12px; font-weight: 800; color: #333; letter-spacing: 2px;">KM/H</span>
    </div>

    <div id="elevation" class="widget">⛰️ <span id="alt-val">--</span> m</div>
    
    <button id="lock-btn" onclick="toggleLock()">🔒</button>

    <div id="map"></div>

    <script>
        let map, marker, userPos = { lat: 48.8566, lng: 2.3522 };
        let isLocked = true;
        let lastWeatherUpdate = 0;

        function initMap() {
            try {
                map = new google.maps.Map(document.getElementById("map"), {
                    center: userPos, 
                    zoom: 18, 
                    tilt: 45, 
                    heading: 0,
                    // Si tu as un nouveau Map ID, mets-le ici. Sinon, laisse vide pour tester.
                    // mapId: "TON_NOUVEAU_MAP_ID", 
                    disableDefaultUI: true, 
                    gestureHandling: "greedy"
                });

                marker = new google.maps.Marker({
                    position: userPos, 
                    map: map,
                    icon: {
                        path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW,
                        scale: 8, fillColor: "#ff0000", fillOpacity: 1,
                        strokeWeight: 2, strokeColor: "#ffffff", rotation: 0
                    }
                });
            } catch(e) { 
                console.error("Erreur de chargement de la carte :", e); 
            }
        }

        async function startApp() {
            document.getElementById('start-screen').style.display = 'none';
            if ('wakeLock' in navigator) {
                try { await navigator.wakeLock.request('screen'); } catch (err) {}
            }

            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const res = await DeviceOrientationEvent.requestPermission();
                    if (res === 'granted') window.addEventListener('deviceorientation', handleRotation, true);
                } catch(e) {}
            } else {
                window.addEventListener('deviceorientation', handleRotation, true);
            }
            activateGPS();
        }

        function handleRotation(e) {
            let heading = e.webkitCompassHeading || (360 - e.alpha);
            if (heading && map && marker) {
                const icon = marker.getIcon();
                icon.rotation = heading;
                marker.setIcon(icon);
                if (isLocked) map.setHeading(heading);
            }
        }

        function activateGPS() {
            navigator.geolocation.watchPosition((p) => {
                userPos = { lat: p.coords.latitude, lng: p.coords.longitude };
                if (marker) marker.setPosition(userPos);
                if (isLocked && map) map.setCenter(userPos);
                document.getElementById('speed-val').innerText = Math.round((p.coords.speed || 0) * 3.6);
                if (p.coords.altitude !== null) document.getElementById('alt-val').innerText = Math.round(p.coords.altitude);
                if (Date.now() - lastWeatherUpdate > 600000) {
                    fetchWeather();
                    lastWeatherUpdate = Date.now();
                }
            }, (e) => console.error("GPS Error", e), { enableHighAccuracy: true });
        }

        async function fetchWeather() {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${userPos.lat}&longitude=${userPos.lng}&current_weather=true`);
                const data = await res.json();
                document.getElementById('temp-val').innerText = Math.round(data.current_weather.temperature);
            } catch (e) {}
        }

        function toggleLock() {
            isLocked = !isLocked;
            const btn = document.getElementById('lock-btn');
            btn.innerText = isLocked ? "🔒" : "🔓";
            btn.style.background = isLocked ? "#ff0000" : "#444";
        }
    </script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBN-m4BiC0T71ftObq197Esiu9o9k925ig&callback=initMap" async defer></script>
</body>
</html>
