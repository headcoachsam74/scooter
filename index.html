<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Scooter - Live</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { font-family: 'Arial', sans-serif; margin: 0; background-color: #0b0b0b; color: #ffffff; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        
        /* Look Noir et Rouge */
        .header { border-bottom: 3px solid #ff0000; padding-bottom: 10px; margin-bottom: 20px; text-align: center; }
        h1 { color: #ff0000; text-transform: uppercase; letter-spacing: 2px; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        
        .stat-card { background: #1a1a1a; border: 1px solid #333; border-left: 5px solid #ff0000; padding: 20px; border-radius: 5px; text-align: center; }
        .stat-value { font-size: 35px; font-weight: bold; color: #ff0000; display: block; }
        .stat-label { font-size: 12px; text-transform: uppercase; color: #888; }

        #map { height: 400px; width: 100%; border-radius: 10px; border: 1px solid #ff0000; box-shadow: 0 0 15px rgba(255, 0, 0, 0.2); }
        
        .weather-info { color: #fff; font-style: italic; margin-top: 5px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Scooter Telemetry</h1>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-label">Vitesse Actuelle</span>
            <span class="stat-value" id="speed">0 <small style="font-size: 15px;">km/h</small></span>
        </div>
        
        <div class="stat-card">
            <span class="stat-label">Longueur du trajet</span>
            <span class="stat-value" id="distance">0.0 <small style="font-size: 15px;">km</small></span>
        </div>

        <div class="stat-card">
            <span class="stat-label">Météo / <span id="city">Ville</span></span>
            <span class="stat-value" id="temp">--°C</span>
            <span class="weather-info" id="desc">Chargement...</span>
        </div>
    </div>

    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // 1. MÉTÉO (Avec votre clé)
    const apiKey = "2363a4d3b8b7a54f0eab1c09d32c8c8e";
    const city = "Paris"; 

    async function updateWeather() {
        try {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric&lang=fr`);
            const data = await res.json();
            if(data.cod === 200) {
                document.getElementById('temp').innerText = Math.round(data.main.temp) + "°C";
                document.getElementById('desc').innerText = data.weather[0].description;
                document.getElementById('city').innerText = data.name;
            }
        } catch (e) { console.log("Erreur Météo"); }
    }

    // 2. CARTE
    const map = L.map('map').setView([48.8566, 2.3522], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    const marker = L.marker([48.8566, 2.3522]).addTo(map).bindPopup("Scooter Connecté");

    // 3. SIMULATION VITESSE / TRAJET
    // Note : Si vous avez un boîtier GPS, c'est ici qu'il faudra connecter vos données réelles
    let speed = 0;
    let distance = 0.0;

    setInterval(() => {
        // Exemple de variation aléatoire pour le test
        speed = Math.floor(Math.random() * 50); 
        distance += 0.01;
        
        document.getElementById('speed').innerHTML = `${speed} <small style="font-size: 15px;">km/h</small>`;
        document.getElementById('distance').innerHTML = `${distance.toFixed(2)} <small style="font-size: 15px;">km</small>`;
    }, 3000);

    updateWeather();
</script>

</body>
</html>
