<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kaabo Dash</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: sans-serif; overflow: hidden; color: white; }
        
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }

        /* Interface */
        #top-bar {
            position: absolute; top: 10px; left: 10px; right: 10px; height: 120px; z-index: 10;
            background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(10px); border-radius: 20px;
            display: grid; grid-template-columns: 1fr 1fr 1fr; align-items: center; text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        #speed-val { font-size: 45px; font-weight: 900; color: #ff0000; display: block; }
        .label { font-size: 10px; color: #777; text-transform: uppercase; margin-bottom: 5px; }
        .val { font-size: 18px; font-weight: bold; }

        #music-dock {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 200px; height: 60px; z-index: 10;
            background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(10px);
            border-radius: 30px; display: flex; align-items: center; justify-content: center; gap: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Start Screen */
        #start-screen { 
            position: fixed; inset: 0; background: #000; z-index: 2000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        #start-btn { 
            padding: 20px 50px; background: #ff0000; color: white; border: none; 
            border-radius: 50px; font-size: 20px; font-weight: bold; cursor: pointer;
        }

        /* Modal */
        #weather-modal { 
            display: none; position: fixed; inset: 0; z-index: 3000; 
            background: rgba(0,0,0,0.9); align-items: center; justify-content: center; 
        }
        .modal-content { background: #111; padding: 20px; border-radius: 20px; width: 80%; border: 1px solid #ff0000; text-align: center; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 style="color:#ff0000; letter-spacing: 10px;">KAABO</h1>
        <button id="start-btn" onclick="startApp()">DÉMARRER</button>
    </div>

    <div id="top-bar">
        <div onclick="openWeather()">
            <div class="label">Météo</div>
            <div class="val" id="temp-val">--°</div>
        </div>
        <div>
            <span id="speed-val">0</span>
            <div class="label" style="margin-top:-5px">KM/H</div>
        </div>
        <div>
            <div class="label">Distance</div>
            <div class="val" id="odo-val">0.00</div>
            <button onclick="resetOdo()" style="font-size:8px; background:#333; color:white; border:none; border-radius:4px;">RESET</button>
        </div>
    </div>

    <div id="music-dock">
        <button onclick="console.log('prev')" style="background:none; border:none; color:white; font-size:20px;">⏮</button>
        <button onclick="console.log('play')" style="background:none; border:none; color:#ff0000; font-size:30px;">⏯</button>
        <button onclick="console.log('next')" style="background:none; border:none; color:white; font-size:20px;">⏭</button>
    </div>

    <div id="weather-modal" onclick="closeWeather()">
        <div class="modal-content">
            <h3>PRÉVISIONS</h3>
            <div id="forecast-list" style="display:flex; overflow-x:auto; gap:10px; margin:15px 0;"></div>
            <button onclick="closeWeather()" style="padding:10px 20px; background:#ff0000; border:none; border-radius:20px; color:white;">FERMER</button>
        </div>
    </div>

    <div id="map"></div>

    <script>
        let map, marker, userPos = { lat: 45.5, lng: -73.5 }, lastPos = null;
        let totalDistance = parseFloat(localStorage.getItem('kaabo_odo')) || 0;

        function initMap() {
            try {
                map = new google.maps.Map(document.getElementById("map"), {
                    center: userPos, zoom: 18, tilt: 45, heading: 0,
                    disableDefaultUI: true, mapId: "90f87356969d889"
                });
                marker = new google.maps.Marker({
                    position: userPos, map: map,
                    icon: { path: google.maps.SymbolPath.CIRCLE, scale: 10, fillColor: "#ff0000", fillOpacity: 1, strokeWeight: 2, strokeColor: "#fff" }
                });
                document.getElementById('odo-val').innerText = totalDistance.toFixed(2);
            } catch(e) { console.error("Google Maps non chargé"); }
        }

        async function startApp() {
            document.getElementById('start-screen').style.display = 'none';
            
            // GPS
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((p) => {
                    const newPos = { lat: p.coords.latitude, lng: p.coords.longitude };
                    const speed = (p.coords.speed || 0) * 3.6;
                    
                    document.getElementById('speed-val').innerText = Math.round(speed);
                    
                    if (lastPos && speed > 1) {
                        totalDistance += haversine(lastPos, newPos);
                        localStorage.setItem('kaabo_odo', totalDistance);
                        document.getElementById('odo-val').innerText = totalDistance.toFixed(2);
                    }
                    lastPos = newPos;
                    if (marker) marker.setPosition(newPos);
                    if (map) { 
                        map.setCenter(newPos);
                        map.setHeading(p.coords.heading || 0);
                    }
                }, null, { enableHighAccuracy: true });
            }

            // Météo Initiale
            fetchWeather();
        }

        function haversine(p1, p2) {
            const R = 6371;
            const dLat = (p2.lat - p1.lat) * Math.PI / 180;
            const dLon = (p2.lng - p1.lng) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(p1.lat*Math.PI/180)*Math.cos(p2.lat*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        async function fetchWeather() {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${userPos.lat}&longitude=${userPos.lng}&current_weather=true&hourly=temperature_2m,weathercode&forecast_days=1`);
                const data = await res.json();
                document.getElementById('temp-val').innerText = Math.round(data.current_weather.temperature) + "°";
                
                const list = document.getElementById('forecast-list');
                list.innerHTML = "";
                const h = new Date().getHours();
                for(let i=h+1; i<h+7; i++) {
                    const temp = Math.round(data.hourly.temperature_2m[i] || 0);
                    list.innerHTML += `<div style="min-width:50px;">${i%24}h<br>☀️<br><b>${temp}°</b></div>`;
                }
            } catch(e) {}
        }

        function resetOdo() { totalDistance = 0; localStorage.setItem('kaabo_odo', 0); document.getElementById('odo-val').innerText = "0.00"; }
        function openWeather() { document.getElementById('weather-modal').style.display = 'flex'; }
        function closeWeather() { document.getElementById('weather-modal').style.display = 'none'; }
    </script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBN-m4BiC0T71ftObq197Esiu9o9k925ig&callback=initMap" async defer></script>
</body>
</html>
