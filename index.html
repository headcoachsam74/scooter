<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scooter Pro Dashboard</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { font-family: 'Arial', sans-serif; margin: 0; background-color: #0b0b0b; color: #fff; overflow: hidden; }
        #dashboard { height: 100vh; display: flex; flex-direction: column; }
        
        /* Header & Stats */
        .header { border-bottom: 2px solid #ff0000; padding: 10px; background: #1a1a1a; display: flex; justify-content: space-around; align-items: center; }
        .stat-item { text-align: center; }
        .label { font-size: 10px; color: #888; text-transform: uppercase; display: block; }
        .value { font-size: 24px; font-weight: bold; color: #ff0000; }

        /* Carte */
        #map { flex-grow: 1; width: 100%; border-top: 1px solid #333; }

        /* Bouton Plein Écran / Start */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
        }
        button {
            padding: 15px 30px; font-size: 18px; background: #ff0000; color: white;
            border: none; border-radius: 50px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="color: #ff0000; margin-bottom: 20px;">SCOOTER CONNECT</h1>
    <button onclick="startDashboard()">DÉMARRER LE TRAJET</button>
</div>

<div id="dashboard">
    <div class="header">
        <div class="stat-item">
            <span class="label">Vitesse</span>
            <span class="value" id="speed">0</span> <small>km/h</small>
        </div>
        <div class="stat-item">
            <span class="label">Distance</span>
            <span class="value" id="distance">0.00</span> <small>km</small>
        </div>
        <div class="stat-item">
            <span class="label">Météo</span>
            <span class="value" id="temp">--°C</span>
        </div>
    </div>
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    let map, marker, path;
    let totalDistance = 0;
    let lastCoords = null;
    const apiKey = "2363a4d3b8b7a54f0eab1c09d32c8c8e";

    // 1. DÉMARRAGE (Plein écran + GPS)
    function startDashboard() {
        document.getElementById('overlay').style.display = 'none';
        
        // Activer le plein écran
        const doc = document.documentElement;
        if (doc.requestFullscreen) doc.requestFullscreen();
        else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();

        initMap();
        startTracking();
        getWeather();
    }

    // 2. INITIALISATION CARTE
    function initMap() {
        map = L.map('map', { zoomControl: false }).setView([48.8566, 2.3522], 18);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        marker = L.marker([48.8566, 2.3522]).addTo(map);
        path = L.polyline([], {color: 'red'}).addTo(map);
    }

    // 3. TRACKING GPS RÉEL
    function startTracking() {
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition((pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                const speedMs = pos.coords.speed || 0; // Vitesse en m/s
                const speedKmh = Math.round(speedMs * 3.6);

                const newPos = [lat, lon];
                
                // Mise à jour affichage
                document.getElementById('speed').innerText = speedKmh;
                marker.setLatLng(newPos);
                map.panTo(newPos);
                path.addLatLng(newPos);

                // Calcul distance
                if (lastCoords) {
                    const d = map.distance(lastCoords, newPos); // distance en mètres
                    totalDistance += d / 1000;
                    document.getElementById('distance').innerText = totalDistance.toFixed(2);
                }
                lastCoords = newPos;

            }, (err) => { alert("Activez votre GPS !"); }, 
            { enableHighAccuracy: true });
        }
    }

    // 4. MÉTÉO
    async function getWeather() {
        try {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=Paris&appid=${apiKey}&units=metric`);
            const data = await res.json();
            document.getElementById('temp').innerText = Math.round(data.main.temp) + "°C";
        } catch (e) {}
    }
</script>

</body>
</html>
