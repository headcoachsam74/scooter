<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kaabo Smart Dashboard</title>
    
    <script src="https://mapbox.com"></script>
    <link href="https://mapbox.com" rel="stylesheet" />
    
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: 'Arial Black', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; }
        
        /* Widgets de base */
        .widget {
            position: absolute; z-index: 10; background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px); padding: 8px 12px; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.4);
        }

        /* Bloc Vitesse + Logo Adaptatif */
        #speed-block {
            position: absolute; z-index: 15;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px);
            padding: 12px; border-radius: 20px;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            transition: all 0.3s ease-in-out;
        }

        #logo-kaabo { width: 70px; height: auto; }
        #speed-val { font-size: 44px; font-weight: 900; color: #ff0000; line-height: 0.9; }
        .unit { font-size: 11px; color: #333; font-weight: 800; }

        /* --- ADAPTATION SELON L'ORIENTATION --- */
        
        /* MODE VERTICAL (Portrait) */
        @media (orientation: portrait) {
            #speed-block { top: 20px; left: 50%; transform: translateX(-50%); min-width: 140px; }
            #weather { top: 20px; left: 15px; font-size: 14px; }
            #alt { bottom: 100px; left: 15px; }
        }

        /* MODE HORIZONTAL (Paysage) */
        @media (orientation: landscape) {
            #speed-block { top: 15px; right: 15px; min-width: 110px; }
            #weather { top: 15px; left: 15px; }
            #alt { bottom: 25px; left: 15px; }
        }

        /* Bouton Recentre */
        #recenter-btn {
            position: absolute; bottom: 25px; right: 20px; z-index: 20;
            width: 55px; height: 55px; background: #ff0000; border: 2px solid white;
            border-radius: 50%; color: white; font-size: 26px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(255,0,0,0.5);
        }

        .nav-arrow {
            width: 0; height: 0; border-left: 9px solid transparent;
            border-right: 9px solid transparent; border-bottom: 20px solid #ff0000;
        }

        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; display: flex; flex-direction: column;
            align-items: center; justify-content: center; color: white;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 style="font-style: italic; letter-spacing: 10px;">KAABO</h1>
        <button style="padding: 15px 30px; background: #ff0000; color: white; border: none; font-weight: bold; border-radius: 5px;" onclick="init()">DÉMARRER</button>
    </div>

    <div id="weather" class="widget">
        <span id="temp-val">--</span>°C
    </div>

    <div id="speed-block">
        <img src="logo-kaboo.png" id="logo-kaabo" alt="Kaabo">
        <span id="speed-val">0</span>
        <span class="unit">KM/H</span>
    </div>

    <div id="alt" class="widget">
        ALT: <span id="alt-val">--</span>m
    </div>

    <button id="recenter-btn" onclick="recenter()">🎯</button>
    <div id="map"></div>

    <script>
        let userPos = [2.3522, 48.8566];
        let isLocked = true;

        const map = new mapboxgl.Map({
            container: 'map',
            style: 'https://cartocdn.com', 
            center: userPos, zoom: 17, pitch: 65, bearing: 0
        });

        const el = document.createElement('div');
        el.className = 'nav-arrow';
        const marker = new mapboxgl.Marker(el).setLngLat(userPos).addTo(map);

        async function init() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                const state = await DeviceOrientationEvent.requestPermission();
                if (state === 'granted') startTracking();
            } else { startTracking(); }
            document.getElementById('start-screen').style.display = 'none';
        }

        function startTracking() {
            window.addEventListener('deviceorientation', (e) => {
                let heading = e.webkitCompassHeading || (360 - e.alpha);
                if (heading && isLocked) map.setBearing(heading);
            });

            navigator.geolocation.watchPosition((pos) => {
                userPos = [pos.coords.longitude, pos.coords.latitude];
                marker.setLngLat(userPos);
                if (isLocked) map.easeTo({ center: userPos, duration: 600 });
                document.getElementById('speed-val').innerText = Math.round((pos.coords.speed || 0) * 3.6);
                if (pos.coords.altitude) document.getElementById('alt-val').innerText = Math.round(pos.coords.altitude);
            }, null, { enableHighAccuracy: true });
            fetchWeather();
        }

        async function fetchWeather() {
            try {
                const res = await fetch(`https://open-meteo.com{userPos}&longitude=${userPos}&current_weather=true`);
                const data = await res.json();
                document.getElementById('temp-val').innerText = Math.round(data.current_weather.temperature);
            } catch (e) {}
        }

        function recenter() {
            isLocked = true;
            map.easeTo({ center: userPos, zoom: 17, pitch: 65, duration: 800 });
        }

        map.on('dragstart', () => { isLocked = false; });
    </script>
</body>
</html>
