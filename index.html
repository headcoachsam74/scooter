<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kaabo Dashboard Final</title>
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: sans-serif; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; background: #fff; } /* Fond blanc forcé */
        .widget { position: absolute; z-index: 10; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); padding: 10px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-align: center; }
        #main-dash { min-width: 130px; display: flex; flex-direction: column; align-items: center; }
        #speed-val { font-size: 50px; font-weight: 900; color: #ff0000; line-height: 0.9; }
        @media (orientation: portrait) { #main-dash { top: 20px; left: 50%; transform: translateX(-50%); } #weather { top: 20px; left: 15px; } #elevation { bottom: 110px; left: 15px; } }
        @media (orientation: landscape) { #main-dash { top: 15px; right: 15px; } #weather { top: 15px; left: 15px; } #elevation { bottom: 25px; left: 15px; } }
        #start-screen { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #start-btn { padding: 20px 50px; background: #ff0000; color: white; border: none; border-radius: 5px; font-size: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="start-screen">
        <img src="logo-kaboo.png" style="width:180px; margin-bottom:40px;" onerror="this.style.display='none'">
        <button id="start-btn" onclick="startApp()">DÉMARRER</button>
    </div>

    <div id="weather" class="widget">☀️ <span id="temp-val">--</span>°C</div>
    <div id="main-dash" class="widget">
        <img src="logo-kaboo.png" style="width:80px; margin-bottom:5px;" onerror="this.style.display='none'">
        <span id="speed-val">0</span>
        <span style="font-size: 11px; font-weight: 800;">KM/H</span>
    </div>
    <div id="elevation" class="widget"><span id="alt-val">--</span> m</div>
    <div id="map"></div>

    <script>
        let map, marker, userPos = { lat: 48.8566, lng: 2.3522 }, isLocked = true;

        function initMap() {
            try {
                map = new google.maps.Map(document.getElementById("map"), {
                    center: userPos, zoom: 18, tilt: 45, mapId: "90f87356969d889", disableDefaultUI: true
                });
                marker = new google.maps.Marker({
                    position: userPos, map: map,
                    icon: { path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW, scale: 7, fillColor: "#ff0000", fillOpacity: 1, strokeWeight: 2, strokeColor: "#ffffff" }
                });
            } catch (e) { console.error("Erreur chargement map"); }
        }

        async function startApp() {
            document.getElementById('start-screen').style.display = 'none';
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                const res = await DeviceOrientationEvent.requestPermission();
                if (res === 'granted') window.addEventListener('deviceorientation', handleRotation, true);
            } else { window.addEventListener('deviceorientation', handleRotation, true); }
            activateGPS();
        }

        function handleRotation(e) {
            let heading = e.webkitCompassHeading || (360 - e.alpha);
            if (heading && isLocked && map && marker) {
                map.setHeading(heading);
                const icon = marker.getIcon();
                icon.rotation = heading;
                marker.setIcon(icon);
            }
        }

        function activateGPS() {
            navigator.geolocation.watchPosition((p) => {
                userPos = { lat: p.coords.latitude, lng: p.coords.longitude };
                if (marker) marker.setPosition(userPos);
                if (isLocked && map) map.setCenter(userPos);
                
                document.getElementById('speed-val').innerText = Math.round((p.coords.speed || 0) * 3.6);
                if (p.coords.altitude !== null) document.getElementById('alt-val').innerText = Math.round(p.coords.altitude);
                fetchWeather();
            }, null, { enableHighAccuracy: true });
        }

        async function fetchWeather() {
            try {
                const res = await fetch(`https://open-meteo.com{userPos.lat}&longitude=${userPos.lng}&current_weather=true`);
                const data = await res.json();
                document.getElementById('temp-val').innerText = Math.round(data.current_weather.temperature);
            } catch (e) {}
        }
    </script>
    <script src="https://googleapis.com" async defer></script>
</body>
</html>
