<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kaabo Dashboard Pro</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
        
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; background: #1a1a1a; }
        
        .widget { 
            position: absolute; z-index: 10; 
            background: rgba(15, 15, 15, 0.85); 
            backdrop-filter: blur(10px); 
            padding: 12px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.7); 
            text-align: center; border: 1px solid rgba(255,255,255,0.1);
            color: white; cursor: pointer;
        }

        #main-dash { min-width: 160px; top: 20px; left: 50%; transform: translateX(-50%); cursor: default; }
        .mini-logo { width: 80px; height: auto; display: block; margin: 0 auto 5px auto; }
        #speed-val { font-size: 65px; font-weight: 900; color: #ff0000; display: block; line-height: 0.8; }
        .unit { font-size: 14px; font-weight: 900; color: #aaa; letter-spacing: 3px; }
        
        #weather { top: 20px; left: 15px; font-size: 16px; }
        #elevation { bottom: 30px; left: 15px; font-size: 14px; }

        /* MODALE MÉTÉO */
        #weather-modal {
            display: none; position: fixed; inset: 0; z-index: 3000;
            background: rgba(0,0,0,0.85); align-items: center; justify-content: center;
        }
        .modal-content {
            background: #1a1a1a; padding: 20px; border-radius: 30px; width: 90%; max-width: 350px;
            border: 1px solid #ff0000; text-align: center; color: white;
        }
        .forecast-container {
            display: flex; overflow-x: auto; gap: 15px; margin: 20px 0; padding-bottom: 10px;
        }
        .forecast-item {
            min-width: 65px; background: #222; padding: 10px; border-radius: 15px;
            flex-shrink: 0; border: 1px solid #333;
        }
        .forecast-time { font-size: 11px; color: #888; }
        .forecast-temp { font-weight: bold; color: #ff0000; }
        .close-modal { margin-top: 10px; padding: 12px 40px; background: #ff0000; border: none; border-radius: 25px; color: white; font-weight: bold; }

        #lock-btn { 
            position: absolute; bottom: 30px; right: 15px; z-index: 100;
            width: 65px; height: 65px; border-radius: 50%;
            background: #ff0000; color: white; border: none;
            font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        #start-screen { 
            position: fixed; inset: 0; background: #000; z-index: 2000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .main-logo { width: 250px; height: auto; margin-bottom: 40px; }
        #start-btn { padding: 22px 70px; background: #ff0000; color: white; border: none; border-radius: 50px; font-size: 22px; font-weight: 900; }

        @media (orientation: landscape) { #main-dash { top: 15px; right: 15px; left: auto; transform: none; } }
    </style>
</head>
<body>

    <div id="start-screen">
        <img src="logo-kaboo.png" class="main-logo" alt="KAABO" onerror="this.style.display='none';">
        <button id="start-btn" onclick="startApp()">DÉMARRER</button>
    </div>

    <div id="weather-modal" onclick="closeWeather()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 style="margin:0; text-transform: uppercase;">Prévisions</h3>
            <div id="forecast-list" class="forecast-container"></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
                <div style="background:#222; padding:10px; border-radius:15px; font-size:12px;">🌬️ Vent<br><b id="meteo-wind">--</b></div>
                <div style="background:#222; padding:10px; border-radius:15px; font-size:12px;">🌡️ Ressenti<br><b id="meteo-app">--</b></div>
            </div>
            <button class="close-modal" onclick="closeWeather()">Fermer</button>
        </div>
    </div>

    <div id="weather" class="widget" onclick="openWeather()">☀️ <span id="temp-val">--</span>°C</div>

    <div id="main-dash" class="widget">
        <img src="logo-kaboo.png" class="mini-logo" alt="logo" onerror="this.style.display='none';">
        <span id="speed-val">0</span>
        <span class="unit">KM/H</span>
    </div>

    <div id="elevation" class="widget">⛰️ <span id="alt-val">--</span> m</div>
    
    <button id="lock-btn" onclick="toggleLock()">🔒</button>

    <div id="map"></div>

    <script>
        let map, marker, userPos = { lat: 45.5017, lng: -73.5673 };
        let isLocked = true;
        let lastWeatherUpdate = 0;

        function initMap() {
            if (typeof google === 'undefined') return;
            map = new google.maps.Map(document.getElementById("map"), {
                center: userPos, zoom: 19, tilt: 45, heading: 0,
                disableDefaultUI: true, gestureHandling: "greedy",
                mapId: "90f87356969d889"
            });
            marker = new google.maps.Marker({
                position: userPos, map: map,
                icon: {
                    path: google.maps.SymbolPath.CIRCLE,
                    scale: 12, fillColor: "#ff0000", fillOpacity: 1,
                    strokeWeight: 4, strokeColor: "#ffffff"
                }
            });
        }

        async function startApp() {
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(() => {});
            document.getElementById('start-screen').style.display = 'none';
            if ('wakeLock' in navigator) { try { await navigator.wakeLock.request('screen'); } catch (err) {} }
            
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const res = await DeviceOrientationEvent.requestPermission();
                    if (res === 'granted') window.addEventListener('deviceorientation', handleRotation, true);
                } catch(e) {}
            } else {
                window.addEventListener('deviceorientation', handleRotation, true);
            }
            activateGPS();
        }

        function handleRotation(e) {
            let heading = e.webkitCompassHeading || (360 - e.alpha);
            if (heading && isLocked && map) {
                map.setHeading(heading);
            }
        }

        function activateGPS() {
            navigator.geolocation.watchPosition((p) => {
                userPos = { lat: p.coords.latitude, lng: p.coords.longitude };
                const speed = Math.round((p.coords.speed || 0) * 3.6);
                if (marker) marker.setPosition(userPos);
                if (isLocked && map) {
                    map.setCenter(userPos);
                    map.setZoom(speed > 30 ? 17 : 19);
                }
                document.getElementById('speed-val').innerText = speed;
                if (p.coords.altitude !== null) document.getElementById('alt-val').innerText = Math.round(p.coords.altitude);
                
                if (Date.now() - lastWeatherUpdate > 600000) { 
                    fetchWeather(); 
                    lastWeatherUpdate = Date.now(); 
                }
            }, null, { enableHighAccuracy: true });
        }

        async function fetchWeather() {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${userPos.lat}&longitude=${userPos.lng}&current_weather=true&hourly=temperature_2m,weathercode,apparent_temperature&forecast_days=1`);
                const data = await res.json();
                
                document.getElementById('temp-val').innerText = Math.round(data.current_weather.temperature);
                document.getElementById('meteo-wind').innerText = Math.round(data.current_weather.windspeed) + " km/h";
                document.getElementById('meteo-app').innerText = Math.round(data.hourly.apparent_temperature[0]) + "°C";

                const list = document.getElementById('forecast-list');
                list.innerHTML = "";
                const currentHour = new Date().getHours();
                for(let i = currentHour + 1; i < currentHour + 9; i++) {
                    const idx = i > 23 ? i-24 : i;
                    const temp = Math.round(data.hourly.temperature_2m[i]);
                    const code = data.hourly.weathercode[i];
                    let icon = code > 50 ? "🌧️" : (code > 0 ? "☁️" : "☀️");
                    list.innerHTML += `<div class="forecast-item"><div class="forecast-time">${idx}h</div><div style="font-size:20px;">${icon}</div><div class="forecast-temp">${temp}°</div></div>`;
                }
            } catch (e) {}
        }

        function openWeather() { document.getElementById('weather-modal').style.display = 'flex'; }
        function closeWeather() { document.getElementById('weather-modal').style.display = 'none'; }
        function toggleLock() {
            isLocked = !isLocked;
            const btn = document.getElementById('lock-btn');
            btn.innerText = isLocked ? "🔒" : "🔓";
            btn.style.background = isLocked ? "#ff0000" : "#444";
        }
    </script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBN-m4BiC0T71ftObq197Esiu9o9k925ig&callback=initMap" async defer></script>
</body>
</html>
