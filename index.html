<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kaabo Dashboard Final</title>
    
    <!-- Scripts MapLibre Fixes -->
    <script src="https://unpkg.com"></script>
    <link href="https://unpkg.com" rel="stylesheet" />
    
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: sans-serif; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; background: #f0f0f0; }
        
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #logo-start { width: 180px; height: auto; margin-bottom: 40px; }
        #start-btn {
            padding: 20px 50px; background: #ff0000; color: white;
            border: none; border-radius: 5px; font-size: 22px; font-weight: bold; cursor: pointer;
        }

        .widget {
            position: absolute; z-index: 10; background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px); padding: 12px; border-radius: 15px; text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 1px solid rgba(0,0,0,0.1);
        }

        #main-dash { min-width: 140px; display: flex; flex-direction: column; align-items: center; }
        #logo-kaabo { width: 80px; height: auto; margin-bottom: 5px; }
        #speed-val { font-size: 54px; font-weight: 900; color: #ff0000; line-height: 0.9; }

        @media (orientation: portrait) {
            #main-dash { top: 20px; left: 50%; transform: translateX(-50%); }
            #weather { top: 20px; left: 15px; }
            #elevation { bottom: 120px; left: 15px; }
        }
        @media (orientation: landscape) {
            #main-dash { top: 15px; right: 15px; }
            #weather { top: 15px; left: 15px; }
            #elevation { bottom: 25px; left: 15px; }
        }

        #recenter-btn {
            position: absolute; bottom: 30px; right: 20px; z-index: 20;
            width: 65px; height: 65px; background: #ff0000; border: 2px solid white; border-radius: 50%; color: white; font-size: 30px;
        }
        .nav-arrow { width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-bottom: 22px solid #ff0000; }
    </style>
</head>
<body>
    <div id="start-screen">
        <img src="logo-kaboo.png" id="logo-start" alt="Kaabo" onerror="this.style.display='none'">
        <button id="start-btn" onclick="startApp()">DÉMARRER</button>
    </div>

    <div id="weather" class="widget">☀️ <span id="temp-val">--</span>°C</div>
    <div id="main-dash" class="widget">
        <img src="logo-kaboo.png" id="logo-kaabo" alt="Logo" onerror="this.style.display='none'">
        <span id="speed-val">0</span>
        <span style="font-size: 12px; font-weight: bold;">KM/H</span>
    </div>
    <div id="elevation" class="widget"><span style="font-size: 10px; color:#666; display:block; font-weight: bold;">ALTITUDE</span><span id="alt-val">--</span> m</div>

    <button id="recenter-btn" onclick="recenter()">🎯</button>
    <div id="map"></div>

    <script>
        let userPos = [2.3522, 48.8566];
        let isLocked = true;
        let map;

        // On initialise la map mais on ne la charge qu'au démarrage pour éviter le fond blanc
        function initMap() {
            map = new maplibregl.Map({
                container: 'map',
                style: 'https://cartocdn.com', 
                center: userPos, zoom: 17, pitch: 65, bearing: 0, antialias: true
            });

            const el = document.createElement('div'); el.className = 'nav-arrow';
            const marker = new maplibregl.Marker({element: el}).setLngLat(userPos).addTo(map);
            
            map.on('dragstart', () => isLocked = false);
            window.addEventListener('resize', () => map.resize());
        }

        async function startApp() {
            // 1. Plein écran
            const doc = document.documentElement;
            if (doc.requestFullscreen) doc.requestFullscreen();
            else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();

            // 2. Permissions Rotation (Requis iOS)
            if (window.DeviceOrientationEvent && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const res = await DeviceOrientationEvent.requestPermission();
                    if (res === 'granted') window.addEventListener('deviceorientation', handleRotation);
                } catch(e) { console.log(e); }
            } else {
                window.addEventListener('deviceorientation', handleRotation);
            }

            // 3. Lancement Map et GPS
            initMap();
            activateGPS();
            
            document.getElementById('start-screen').style.display = 'none';
        }

        function handleRotation(e) {
            let heading = e.webkitCompassHeading || (360 - e.alpha);
            if (heading && isLocked && map) map.setBearing(heading);
        }

        function activateGPS() {
            navigator.geolocation.watchPosition((p) => {
                userPos = [p.coords.longitude, p.coords.latitude];
                if (map) {
                    // Update marqueur
                    const markerEl = document.querySelector('.nav-arrow');
                    if (markerEl) {
                        // Le marqueur suit la position
                    }
                    if (isLocked) map.easeTo({ center: userPos, duration: 600 });
                }
                
                document.getElementById('speed-val').innerText = Math.round((p.coords.speed || 0) * 3.6);
                if (p.coords.altitude !== null) document.getElementById('alt-val').innerText = Math.round(p.coords.altitude);
                fetchWeather();
            }, null, { enableHighAccuracy: true });
        }

        async function fetchWeather() {
            try {
                const res = await fetch(`https://open-meteo.com{userPos[1]}&longitude=${userPos[0]}&current_weather=true`);
                const data = await res.json();
                document.getElementById('temp-val').innerText = Math.round(data.current_weather.temperature);
            } catch (e) {}
        }

        function recenter() { 
            isLocked = true; 
            if (map) {
                map.resize(); 
                map.easeTo({ center: userPos, zoom: 17, pitch: 65 });
            }
        }
    </script>
</body>
</html>
