<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dashboard Kaabo Pro</title>
    
    <!-- Bibliothèques corrigées (MapLibre - Gratuit et sans clé) -->
    <script src="https://unpkg.com"></script>
    <link href="https://unpkg.com" rel="stylesheet" />
    
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: 'Arial Black', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; position: absolute; top: 0; }
        
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #start-btn {
            padding: 20px 50px; background: #ff0000; color: white; border: none; border-radius: 5px; font-size: 22px; font-weight: bold; cursor: pointer;
        }

        .widget {
            position: absolute; z-index: 10; background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px); padding: 10px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-align: center;
        }

        #speed-block { display: flex; flex-direction: column; align-items: center; gap: 5px; min-width: 120px; }
        #logo-kaabo { width: 80px; height: auto; margin-bottom: 5px; }
        #speed-val { font-size: 48px; font-weight: 900; color: #ff0000; line-height: 0.9; }

        @media (orientation: portrait) {
            #main-dash { top: 20px; left: 50%; transform: translateX(-50%); }
            #weather { top: 20px; left: 15px; }
            #alt { bottom: 120px; left: 15px; }
        }
        @media (orientation: landscape) {
            #main-dash { top: 15px; right: 15px; }
            #weather { top: 15px; left: 15px; }
            #alt { bottom: 25px; left: 15px; }
        }

        #recenter-btn {
            position: absolute; bottom: 30px; right: 20px; z-index: 20;
            width: 60px; height: 60px; background: #ff0000; border: 2px solid white; border-radius: 50%; color: white; font-size: 28px; cursor: pointer;
        }
        .nav-arrow { width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-bottom: 20px solid #ff0000; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 style="color:white; font-style: italic; letter-spacing: 10px; margin-bottom:40px;">KAABO</h1>
        <button id="start-btn" onclick="init()">DÉMARRER</button>
    </div>

    <div id="weather" class="widget">☀️ <span id="temp-val">--</span>°C</div>

    <div id="main-dash" class="widget">
        <div id="speed-block">
            <img src="logo-kaboo.png" id="logo-kaabo" alt="Logo" onerror="this.style.display='none'">
            <span id="speed-val">0</span>
            <span style="font-size: 11px; font-weight: 800;">KM/H</span>
        </div>
    </div>

    <div id="alt" class="widget">ALT: <span id="alt-val">--</span>m</div>

    <button id="recenter-btn" onclick="recenter()">🎯</button>
    <div id="map"></div>

    <script>
        let userPos = [2.3522, 48.8566];
        let isLocked = true;

        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://cartocdn.com', 
            center: userPos, zoom: 17, pitch: 65, antialias: true
        });

        const el = document.createElement('div'); el.className = 'nav-arrow';
        const marker = new maplibregl.Marker({element: el}).setLngLat(userPos).addTo(map);

        function init() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(s => { if(s === 'granted') startTracking(); });
            } else { startTracking(); }
            document.getElementById('start-screen').style.display = 'none';
        }

        function startTracking() {
            window.addEventListener('deviceorientation', (e) => {
                let h = e.webkitCompassHeading || (360 - e.alpha);
                if (h && isLocked) map.setBearing(h);
            });

            navigator.geolocation.watchPosition((p) => {
                userPos = [p.coords.longitude, p.coords.latitude];
                marker.setLngLat(userPos);
                if (isLocked) map.easeTo({ center: userPos, duration: 600 });
                document.getElementById('speed-val').innerText = Math.round((p.coords.speed || 0) * 3.6);
                if (p.coords.altitude) document.getElementById('alt-val').innerText = Math.round(p.coords.altitude);
                fetchWeather();
            }, null, { enableHighAccuracy: true });
        }

        async function fetchWeather() {
            try {
                const res = await fetch(`https://open-meteo.com{userPos[1]}&longitude=${userPos[0]}&current_weather=true`);
                const data = await res.json();
                document.getElementById('temp-val').innerText = Math.round(data.current_weather.temperature);
            } catch (e) {}
        }

        function recenter() { isLocked = true; map.resize(); map.easeTo({ center: userPos, zoom: 17, pitch: 65 }); }
        map.on('dragstart', () => isLocked = false);
    </script>
</body>
</html>
