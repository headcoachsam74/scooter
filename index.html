<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kaabo Dash</title>
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100svh; 
            background: #000; overflow: hidden; overscroll-behavior: none;
            font-family: sans-serif; color: white;
        }

        #map { position: absolute; inset: 0; z-index: 1; background: #1a1a1a; }

        /* Top Bar */
        #top-bar {
            position: absolute; top: 15px; left: 10px; right: 10px; height: 110px; z-index: 10;
            background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-radius: 20px; display: grid; grid-template-columns: 1fr 1.2fr 1fr; align-items: center; 
            text-align: center; border: 1px solid rgba(255,255,255,0.1);
        }

        #speed-val { font-size: 50px; font-weight: 900; color: #ff0000; display: block; line-height: 1; }
        .label { font-size: 10px; color: #666; text-transform: uppercase; }
        .val { font-size: 18px; font-weight: bold; }

        /* Start Screen */
        #start-screen { 
            position: fixed; inset: 0; background: #000; z-index: 2000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .main-logo { width: 250px; height: auto; margin-bottom: 30px; }
        #start-btn { 
            padding: 20px 60px; background: #ff0000; color: white; border: none; 
            border-radius: 50px; font-size: 20px; font-weight: bold; cursor: pointer;
        }

        #weather-modal { 
            display: none; position: fixed; inset: 0; z-index: 3000; 
            background: rgba(0,0,0,0.9); align-items: center; justify-content: center; 
        }
        .modal-content { background: #111; padding: 20px; border-radius: 20px; width: 80%; border: 1px solid #ff0000; text-align: center; }
    </style>
</head>
<body>

    <div id="start-screen">
        <img src="logo-kaboo.png" class="main-logo" alt="KAABO" onerror="this.parentElement.innerHTML += '<h1 style=\'color:red;letter-spacing:10px\'>KAABO</h1>'; this.remove();">
        <button id="start-btn" onclick="startApp()">DÉMARRER</button>
    </div>

    <div id="top-bar">
        <div onclick="openWeather()">
            <div class="label">Météo</div>
            <div id="temp-val" class="val">--°</div>
        </div>
        <div>
            <span id="speed-val">0</span>
            <div class="label">KM/H</div>
        </div>
        <div>
            <div class="label">Trip</div>
            <div id="odo-val" class="val">0.00</div>
            <button onclick="resetOdo()" style="background:#333;color:white;border:none;border-radius:4px;font-size:8px;padding:2px 5px;">RESET</button>
        </div>
    </div>

    <div id="weather-modal" onclick="closeWeather()">
        <div class="modal-content">
            <h3>PRÉVISIONS</h3>
            <div id="forecast-list" style="display:flex; overflow-x:auto; gap:10px; margin:15px 0;"></div>
            <button onclick="closeWeather()" style="background:#ff0000; color:white; border:none; padding:10px 20px; border-radius:10px;">FERMER</button>
        </div>
    </div>

    <div id="map"></div>

    <script>
        let map, marker, userPos = { lat: 45.5, lng: -73.5 }, lastPos = null;
        let totalDistance = parseFloat(localStorage.getItem('kaabo_odo')) || 0;

            });
