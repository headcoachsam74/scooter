<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kaabo Dashboard Music</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
        
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; background: #1a1a1a; }

        /* La Cartouche Supérieure */
        #top-bar {
            position: absolute; top: 10px; left: 10px; right: 10px; height: 130px; z-index: 10;
            background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(15px); border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1); display: grid; grid-template-columns: 1fr 1.5fr 1fr;
            align-items: center; padding: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .side-info { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; color: #888; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        .side-info span { color: #fff; font-size: 18px; font-variant-numeric: tabular-nums; }
        #speedometer { text-align: center; border-left: 1px solid #333; border-right: 1px solid #333; height: 80%; display: flex; flex-direction: column; justify-content: center; }
        .mini-logo { width: 55px; margin: 0 auto 2px; }
        #speed-val { font-size: 50px; font-weight: 900; color: #ff0000; line-height: 1; }
        .unit { font-size: 11px; color: #666; letter-spacing: 2px; font-weight: 800; }
        .reset-btn { background: #222; color: #fff; border: none; padding: 3px 8px; border-radius: 8px; font-size: 9px; margin-top: 4px; }

        /* Widget Musique Inférieur */
        #music-bar {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 350px; height: 70px; z-index: 10;
            background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(15px);
            border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; align-items: center; justify-content: space-around;
            padding: 0 15px; box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }

        .music-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; padding: 10px; }
        .music-btn:active { color: #ff0000; }
        #amazon-launch { width: 35px; height: 35px; border-radius: 8px; cursor: pointer; }

        /* Écran de démarrage */
        #start-screen { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .main-logo { width: 250px; margin-bottom: 40px; }
        #start-btn { padding: 20px 60px; background: #ff0000; color: white; border: none; border-radius: 50px; font-size: 22px; font-weight: 900; }

        /* Modale Météo */
        #weather-modal { display: none; position: fixed; inset: 0; z-index: 3000; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .modal-content { background: #111; padding: 25px; border-radius: 30px; width: 85%; border: 1px solid #ff0000; text-align: center; color: white; }
    </style>
</head>
<body>

    <div id="start-screen">
        <img src="logo-kaboo.png" class="main-logo" alt="KAABO" onerror="this.style.display='none';">
        <button id="start-btn" onclick="startApp()">DÉMARRER</button>
    </div>

    <div id="top-bar">
        <div class="side-info" onclick="openWeather()">MÉTÉO<span id="temp-val">--°</span></div>
        <div id="speedometer">
            <img src="logo-kaboo.png" class="mini-logo" alt="logo" onerror="this.style.display='none';">
            <span id="speed-val">0</span>
            <span class="unit">KM/H</span>
        </div>
        <div class="side-info">DISTANCE<span id="odo-val">0.00</span><button class="reset-btn" onclick="resetOdo()">RESET</button></div>
    </div>

    <div id="music-bar">
        <img id="amazon-launch" src="https://www.amazon.com/favicon.ico" onclick="window.location.href='intent://#Intent;scheme=amazonmusic;package=com.amazon.mp3;end'" alt="Amazon">
        <button class="music-btn" onclick="mediaControl('previoustrack')">⏮</button>
        <button class="music-btn" id="play-pause" onclick="togglePlay()">⏯</button>
        <button class="music-btn" onclick="mediaControl('nexttrack')">⏭</button>
    </div>

    <div id="weather-modal" onclick="closeWeather()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3>PRÉVISIONS</h3>
            <div id="forecast-list" style="display: flex; overflow-x: auto; gap: 12px; margin-bottom: 20px;"></div>
            <button style="padding: 12px 40px; background: #ff0000; border: none; border-radius: 25px; color: white; font-weight: bold;" onclick="closeWeather()">RETOUR</button>
        </div>
    </div>

    <div id="map"></div>

    <script>
        let map, marker, userPos = null, lastPos = null;
        let totalDistance = parseFloat(localStorage.getItem('kaabo_odo')) || 0;
        let lastWeatherUpdate = 0;

        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: 45.5, lng: -73.5 }, zoom: 19, tilt: 60, heading: 0,
                disableDefaultUI: true, gestureHandling: "none", mapId: "90f87356969d889"
            });
            marker = new google.maps.Marker({
                position: { lat: 45.5, lng: -73.5 }, map: map,
                icon: { path: google.maps.SymbolPath.CIRCLE, scale: 14, fillColor: "#ff0000", fillOpacity: 1, strokeWeight: 4, strokeColor: "#ffffff" }
            });
            document.getElementById('odo-val').innerText = totalDistance.toFixed(2);
        }

        async function startApp() {
            document.getElementById('start-screen').style.display = 'none';
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            if ('wakeLock' in navigator) await navigator.wakeLock.request('screen');
            activateGPS();
            window.addEventListener('deviceorientation', (e) => {
                let heading = e.webkitCompassHeading || (360 - e.alpha);
                if (heading && map) map.setHeading(heading);
            }, true);
        }

        function activateGPS() {
            navigator.geolocation.watchPosition((p) => {
                userPos = { lat: p.coords.latitude, lng: p.coords.longitude };
                const speed = (p.coords.speed || 0) * 3.6;
                if (lastPos && speed > 1) {
                    totalDistance += haversineDistance(lastPos, userPos);
                    localStorage.setItem('kaabo_odo', totalDistance);
                    document.getElementById('odo-val').innerText = totalDistance.toFixed(2);
                }
                lastPos = userPos;
                if (marker) marker.setPosition(userPos);
                if (map) { map.setCenter(userPos); map.setZoom(speed > 30 ? 17 : 19); }
                document.getElementById('speed-val').innerText = Math.round(speed);
                if (Date.now() - lastWeatherUpdate > 600000) fetchWeather();
            }, null, { enableHighAccuracy: true });
        }

        function haversineDistance(p1, p2) {
            const R = 6371;
            const dLat = (p2.lat - p1.lat) * Math.PI / 180;
            const dLon = (p2.lng - p1.lng) * Math.PI / 180;
            const a = Math.sin(dLat/2) ** 2 + Math.cos(p1.lat * Math.PI / 180) * Math.cos(p2.lat * Math.PI / 180) * Math.sin(dLon/2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // --- CONTRÔLE MUSIQUE ---
        function mediaControl(action) {
            if ('mediaSession' in navigator) {
                const dummyAudio = document.createElement('audio'); // Nécessaire pour "réveiller" la session media
                navigator.mediaSession.playbackState = "playing";
                // Note : Les navigateurs demandent une action utilisateur. 
                // Cette fonction envoie des commandes système au lecteur en arrière-plan.
            }
            console.log("Action Media: " + action);
            // Simule l'appui touche média du clavier/casque
            window.dispatchEvent(new KeyboardEvent('keydown', {'key': action}));
        }

        function togglePlay() {
            // Sur Android/iOS, on peut souvent contrôler le flux via mediaSession
            mediaControl('playpause');
        }

        function resetOdo() { if(confirm("Reset trajet ?")) { totalDistance = 0; localStorage.setItem('kaabo_odo', 0); document.getElementById('odo-val').innerText = "0.00"; } }
        async function fetchWeather() { /* ... reste identique ... */ }
        function openWeather() { document.getElementById('weather-modal').style.display = 'flex'; }
        function closeWeather() { document.getElementById('weather-modal').style.display = 'none'; }
    </script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBN-m4BiC0T71ftObq197Esiu9o9k925ig&callback=initMap" async defer></script>
</body>
</html>
