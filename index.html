<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kaabo Dashboard Pro QC</title>
    
    <!-- CHARGEMENT PRIORITAIRE DE LEAFLET -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; background: #000; color: #fff; overflow: hidden; height: 100vh; }
        #overlay { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .btn-start { padding: 20px 40px; font-size: 20px; background: #ff3b30; color: #fff; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        
        #main-content { display: flex; flex-direction: column; height: 100vh; }
        .top-section { background: #000; padding: 10px; text-align: center; }
        .vitesse-value { font-size: 100px; font-weight: 900; color: #ff3b30; line-height: 0.8; margin: 10px 0; }
        
        .stats-row { display: flex; justify-content: space-around; gap: 5px; padding: 5px; }
        .stat-card { background: #121212; flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #222; }
        .stat-label { font-size: 9px; color: #666; display: block; text-transform: uppercase; }
        .stat-value { font-size: 22px; font-weight: bold; }

        #map-container { flex-grow: 1; position: relative; background: #ddd; overflow: hidden; }
        #map { width: 100%; height: 100%; transition: transform 0.2s linear; }
        
        .separator { height: 4px; background: #ff3b30; box-shadow: 0 0 10px #ff3b30; z-index: 5; }

        @media (orientation: landscape) {
            #main-content { flex-direction: row; }
            .top-section { width: 35%; height: 100%; border-right: 4px solid #ff3b30; display: flex; flex-direction: column; justify-content: center; }
            .stats-row { flex-direction: column; gap: 8px; }
            #map-container { width: 65%; }
        }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="letter-spacing:4px; margin-bottom:30px;">KAABO PRO QC</h1>
    <button class="btn-start" onclick="initApp()">DÉMARRER</button>
</div>

<div id="main-content">
    <div class="top-section">
        <div style="font-size: 11px; color: #555; letter-spacing: 2px;">VITESSE</div>
        <div class="vitesse-value" id="speed">0</div>
        <div style="font-size: 13px; color: #555;">KM/H</div>
        <div class="stats-row">
            <div class="stat-card"><span class="stat-label">DISTANCE</span><span class="stat-value" id="dist">0.0</span><span style="font-size:10px; color:#555"> KM</span></div>
            <div class="stat-card"><span class="stat-label">ALTITUDE</span><span class="stat-value" id="alt">--</span></div>
            <div class="stat-card"><span class="stat-label">MÉTÉO</span><span class="stat-value" id="temp">--°</span></div>
        </div>
    </div>
    <div class="separator"></div>
    <div id="map-container">
        <div id="map"></div>
    </div>
</div>

<script>
    let map, marker, lastPos = null, totalDist = 0;
    const apiKey = "2363a4d3b8b7a54f0eab1c09d32c8c8e";

    function initApp() {
        // Vérification ultime de Leaflet
        if (typeof L === 'undefined') {
            alert("Erreur : La bibliothèque de carte n'est pas chargée. Vérifiez votre connexion internet.");
            return;
        }

        document.getElementById('overlay').style.display = 'none';
        
        // Plein écran
        const doc = document.documentElement;
        if (doc.requestFullscreen) doc.requestFullscreen();
        else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();

        // Initialisation Carte
        try {
            map = L.map('map', { 
                zoomControl: false, 
                attributionControl: false 
            }).setView([45.5017, -73.5673], 17);

            // Style ARGENT (Haut contraste pour soleil)
            L.tileLayer('https://{s}://{z}/{x}/{y}{r}.png').addTo(map);

            marker = L.circleMarker([45.5017, -73.5673], { 
                color: '#000', 
                fillColor: '#ff3b30', 
                fillOpacity: 1, 
                radius: 10, 
                weight: 3 
            }).addTo(map);
            
            setTimeout(() => { map.invalidateSize(); }, 400);
        } catch (e) { 
            alert("Erreur Carte : " + e.message); 
        }

        // GPS
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition(updateGPS, (err) => {
                let msg = "Erreur GPS : ";
                if (err.code == 1) msg += "Permission refusée. Activez le GPS dans les réglages du navigateur.";
                else if (err.code == 2) msg += "Position indisponible.";
                else msg += err.message;
                alert(msg);
            }, { enableHighAccuracy: true, maximumAge: 0 });
        } else {
            alert("GPS non supporté.");
        }

        getWeather();
    }

    function updateGPS(p) {
        const lat = p.coords.latitude;
        const lon = p.coords.longitude;
        const speed = Math.round((p.coords.speed || 0) * 3.6);
        const heading = p.coords.heading;

        document.getElementById('speed').innerText = speed;
        if (p.coords.altitude) {
            document.getElementById('alt').innerText = Math.round(p.coords.altitude) + "m";
        }

        const pos = [lat, lon];
        marker.setLatLng(pos);
        map.panTo(pos);

        // Rotation boussole
        if (heading !== null && speed > 2) {
            document.getElementById('map').style.transform = `rotate(${-heading}deg)`;
        }

        if (lastPos) {
            let d = map.distance(lastPos, pos);
            totalDist += d / 1000;
            document.getElementById('dist').innerText = totalDist.toFixed(1);
        }
        lastPos = pos;
    }

    async function getWeather() {
        try {
            const r = await fetch(`https://openweathermap.org{apiKey}&units=metric&lang=fr`);
            const d = await r.json();
            if (d.main) document.getElementById('temp').innerText = Math.round(d.main.temp) + "°";
        } catch (e) { 
            console.log("Erreur météo");
        }
    }
</script>
</body>
</html>
