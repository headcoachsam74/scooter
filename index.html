<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suivi Scooter - HTTPS</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background-color: #1a1a1a; color: white; }
        .card { max-width: 900px; margin: auto; background: #2d2d2d; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: #00d4ff; margin-top: 0; }
        
        .dashboard { display: flex; justify-content: space-around; align-items: center; background: #3d3d3d; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .météo-box { text-align: center; }
        .temp { font-size: 32px; font-weight: bold; color: #ffcc00; }
        .desc { text-transform: capitalize; color: #bbb; }

        #map { height: 450px; width: 100%; border-radius: 10px; border: 2px solid #3d3d3d; }
    </style>
</head>
<body>

<div class="card">
    <h1>Scooter Dashboard</h1>
    
    <div class="dashboard">
        <div class="météo-box">
            <div id="city-name">Chargement...</div>
            <div class="temp" id="temp">--°C</div>
            <div class="desc" id="description">Veuillez patienter</div>
        </div>
    </div>

    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // --- 1. CONFIGURATION DE LA MÉTÉO ---
    const apiKey = "2363a4d3b8b7a54f0eab1c09d32c8c8e";
    const city = "Paris"; // Changez par votre ville ici

    async function fetchWeather() {
        try {
            const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric&lang=fr`;
            const response = await fetch(url);
            const data = await response.json();

            if (data.cod === 200) {
                document.getElementById('city-name').innerText = data.name;
                document.getElementById('temp').innerText = Math.round(data.main.temp) + "°C";
                document.getElementById('description').innerText = data.weather[0].description;
            } else {
                document.getElementById('description').innerText = "Erreur Clé/Ville";
            }
        } catch (error) {
            document.getElementById('description').innerText = "Connexion impossible";
        }
    }

    // --- 2. CONFIGURATION DE LA CARTE ---
    // Coordonnées par défaut (Paris)
    const lat = 48.8566;
    const lon = 2.3522;

    const map = L.map('map').setView([lat, lon], 13);

    // Utilisation de Tuiles HTTPS
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // Ajouter le marqueur du scooter
    L.marker([lat, lon]).addTo(map)
        .bindPopup('<b>Mon Scooter</b><br>Position actuelle.')
        .openPopup();

    // Lancement
    fetchWeather();
</script>

</body>
</html>
