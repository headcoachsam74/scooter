<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kaabo Dashboard Pro</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
        
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; background: #1a1a1a; }
        
        .widget { 
            position: absolute; z-index: 10; 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(12px); 
            padding: 10px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            text-align: center; border: 1px solid rgba(255,255,255,0.3);
        }

        #main-dash { 
            min-width: 160px; top: 20px; left: 50%; transform: translateX(-50%); 
            padding-top: 15px;
        }

        /* STYLE DU PETIT LOGO DANS LE COMPTEUR */
        .mini-logo {
            width: 80px; 
            height: auto;
            margin-bottom: 5px;
            filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.1));
        }

        #speed-val { font-size: 65px; font-weight: 900; color: #ff0000; display: block; line-height: 0.8; }
        .unit { font-size: 14px; font-weight: 900; color: #111; letter-spacing: 2px; }
        
        #weather { top: 20px; left: 15px; font-weight: 800; font-size: 14px; }
        #elevation { bottom: 30px; left: 15px; font-weight: 800; font-size: 14px; }

        #lock-btn { 
            position: absolute; bottom: 30px; right: 15px; z-index: 100;
            width: 65px; height: 65px; border-radius: 50%;
            background: #ff0000; color: white; border: none;
            font-size: 28px; cursor: pointer; box-shadow: 0 5px 20px rgba(255,0,0,0.4);
            display: flex; align-items: center; justify-content: center;
        }

        /* STYLE DU GRAND LOGO AU DÉMARRAGE */
        #start-screen { 
            position: fixed; inset: 0; background: #000; z-index: 2000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .main-logo {
            width: 280px; 
            height: auto;
            margin-bottom: 40px;
        }

        #start-btn { 
            padding: 22px 70px; background: #ff0000; color: white; border: none; 
            border-radius: 50px; font-size: 20px; font-weight: 900; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
        }

        @media (orientation: landscape) {
            #main-dash { top: 15px; right: 15px; left: auto; transform: none; }
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <img src="logo-kaboo.png" alt="KAABO" class="main-logo" onerror="this.style.display='none'; document.getElementById('logo-text-start').style.display='block
