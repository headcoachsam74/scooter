<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kaabo Dashboard Pro</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
        
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; background: #1a1a1a; }
        
        .widget { 
            position: absolute; z-index: 10; 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(12px); 
            padding: 12px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            text-align: center; border: 1px solid rgba(255,255,255,0.3);
        }

        #main-dash { min-width: 160px; top: 20px; left: 50%; transform: translateX(-50%); }

        .mini-logo { width: 80px; height: auto; display: block; margin: 0 auto 5px auto; }

        #speed-val { font-size: 60px; font-weight: 900; color: #ff0000; display: block; line-height: 0.9; }
        .unit { font-size: 14px; font-weight: 900; color: #111; letter-spacing: 3px; }
        
        #weather { top: 20px; left: 15px; font-weight: 800; }
        #elevation { bottom: 30px; left: 15px; font-weight: 800; }

        #lock-btn { 
            position: absolute; bottom: 30px; right: 15px; z-index: 100;
            width: 65px; height: 65px; border-radius: 50%;
            background: #ff0000; color: white; border: none;
            font-size: 28px; cursor: pointer; box-shadow: 0 5px 20px rgba(255,0,0,0.4);
            display: flex; align-items: center; justify-content: center;
        }

        #start-screen { 
            position: fixed; inset: 0; background: #000; z-index: 2000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .main-logo { width: 250px; height: auto; margin-bottom: 40px; }

        #start-btn { 
            padding: 22px 70px; background: #ff0000; color: white; border: none; 
            border-radius: 50px; font-size: 22px; font-weight: 900; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px;
        }

        @media (orientation: landscape) {
            #main-dash { top: 15px; right: 15px; left: auto; transform: none; }
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <img src="logo-kaboo.png" class="main-logo" alt="KAABO" onerror="this.onerror=null; this.src=''; this.style.display='none'; document.getElementById('fallback-text').style.display='block';">
        <h1 id="fallback-text" style="color:white; display:none; letter-spacing: 8px; margin-bottom: 40px;">KAABO</h1>
        <button id="start-btn" onclick="startApp()">DÉMARRER</button>
    </div>

    <div id="weather" class="widget">☀️ <span id="temp-val">--</span>°C</div>

    <div id="main-dash" class="widget">
        <img src="logo-kaboo.png" class="mini-logo" alt="logo" onerror="this.style.display='none';">
        <span id="speed-val">0</span>
        <span class="unit">KM/H</span>
    </div>

    <div id="elevation" class="widget">⛰️ <span id="alt-val">--</span> m</div>
    
    <button id="lock-btn" onclick="toggleLock()">🔒</button>

    <div id="map"></div>

    <script>
        let map, marker, userPos = { lat: 45.5017, lng: -73.5673 };
        let isLocked = true;
        let lastWeatherUpdate = 0;

        function initMap() {
            if (typeof google === 'undefined') return;
            try {
                map = new google.maps.Map(document.getElementById("map"), {
                    center: userPos, zoom: 18, tilt: 45, heading: 0,
                    disableDefaultUI: true, gestureHandling: "greedy",
                    mapId: "90f87356969d889"
                });
                marker = new google.maps.Marker({
                    position: userPos, map: map,
                    icon: {
                        path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW,
                        scale: 10, fillColor: "#ff0000", fillOpacity: 1,
                        strokeWeight: 3, strokeColor: "#ffffff", rotation: 0
                    }
                });
            } catch(e) { console.error("Map Error", e); }
        }

        async function startApp() {
            document.getElementById('start-screen').style.display = 'none';
            if ('wakeLock' in navigator) {
                try { await navigator.wakeLock.request('screen'); } catch (err) {}
            }
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const res = await DeviceOrientationEvent.requestPermission();
                    if (res === 'granted') window.addEventListener('deviceorientation', handleRotation, true);
                } catch(e) {}
            } else {
                window.addEventListener('deviceorientation', handleRotation, true);
            }
            activateGPS();
        }

        function handleRotation(e) {
            let heading = e.webkitCompassHeading || (360 - e.alpha);
            if (heading && map && marker) {
                const icon = marker.getIcon();
                icon.rotation = heading;
                marker.setIcon(icon);
                if (isLocked) map.setHeading(heading);
            }
        }

        function activateGPS() {
            navigator.geolocation.watchPosition((p) => {
                userPos = { lat: p.coords.latitude, lng: p.coords.longitude };
                if (marker) marker.setPosition(userPos);
                if (isLocked && map) map.setCenter(userPos);
                document.getElementById('speed-val').innerText = Math.round((p.coords.speed || 0) * 3.6);
                if (p.coords.altitude !== null) document.getElementById('alt-val').innerText = Math.round(p.coords.altitude);
                if (Date.now() - lastWeatherUpdate > 600000) { fetchWeather(); lastWeatherUpdate = Date.now(); }
            }, (e) => console.error(e), { enableHighAccuracy: true });
        }

        async function fetchWeather() {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${userPos.lat}&longitude=${userPos.lng}&current_weather=true`);
                const data = await res.json();
                document.getElementById('temp-val').innerText = Math.round(data.current_weather.temperature);
            } catch (e) {}
        }

        function toggleLock() {
            isLocked = !isLocked;
            const btn = document.getElementById('lock-btn');
            btn.innerText = isLocked ? "🔒" : "🔓";
            btn.style.background = isLocked ? "#ff0000" : "#444";
        }
    </script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBN-m4BiC0T71ftObq197Esiu9o9k925ig&callback=initMap" async defer></script>
</body>
</html>
