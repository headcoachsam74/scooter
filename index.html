<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS Trotinette - Smart Mode</title>
    
    <script src="https://mapbox.com"></script>
    <link href="https://mapbox.com" rel="stylesheet" />
    
    <style>
        body { margin: 0; padding: 0; background: #1a1a1a; font-family: sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; }
        
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #f8f9fa; z-index: 100;
            display: flex; align-items: center; justify-content: center;
        }
        #start-btn {
            padding: 20px 40px; background: #007bff; color: white;
            border: none; border-radius: 50px; font-size: 20px; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); cursor: pointer;
        }

        #speedo {
            position: absolute; top: 20px; right: 20px; z-index: 10;
            background: rgba(255, 255, 255, 0.9); padding: 15px; border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; min-width: 80px;
        }
        #speed-val { font-size: 28px; font-weight: bold; color: #007bff; display: block; }
        .unit { font-size: 12px; color: #666; }

        #recenter-btn {
            position: absolute; bottom: 30px; right: 20px; z-index: 10;
            width: 60px; height: 60px; background: white; border: none;
            border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            cursor: pointer; display: none; font-size: 24px;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <button id="start-btn">DÉMARRER LE GPS</button>
    </div>

    <div id="speedo">
        <span id="speed-val">0</span>
        <span class="unit">km/h</span>
    </div>

    <button id="recenter-btn">🎯</button>
    <div id="map"></div>

    <script>
        let userPos = [2.3522, 48.8566];
        let isLocked = true;

        // Choix du style selon l'heure (Jour: 7h-20h, Nuit sinon)
        const hour = new Date().getHours();
        const isNight = hour < 7 || hour >= 20;
        const mapStyle = isNight 
            ? 'https://cartocdn.com' 
            : 'https://cartocdn.com';

        const map = new mapboxgl.Map({
            container: 'map',
            style: mapStyle, 
            center: userPos,
            zoom: 17,
            pitch: 60,
            bearing: 0
        });

        // Marqueur directionnel (Flèche)
        const el = document.createElement('div');
        el.style.fontSize = '40px';
        el.innerHTML = '🔽'; // Flèche pointant vers le haut de la carte
        const marker = new mapboxgl.Marker(el).setLngLat(userPos).addTo(map);

        const startBtn = document.getElementById('start-btn');
        const recenterBtn = document.getElementById('recenter-btn');

        function init() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(state => {
                    if (state === 'granted') activateGPS();
                });
            } else {
                activateGPS();
            }
            document.getElementById('start-screen').style.display = 'none';
            recenterBtn.style.display = 'block';
        }

        function activateGPS() {
            // Suivi Boussole
            window.addEventListener('deviceorientation', (e) => {
                let heading = e.webkitCompassHeading || (360 - e.alpha);
                if (heading && isLocked) {
                    map.setBearing(heading);
                }
            });

            // Suivi Position & Vitesse
            navigator.geolocation.watchPosition((pos) => {
                userPos = [pos.coords.longitude, pos.coords.latitude];
                marker.setLngLat(userPos);
                
                if (isLocked) {
                    map.easeTo({ center: userPos, duration: 800 });
                }

                // Vitesse en km/h
                if (pos.coords.speed > 0.5) {
                    document.getElementById('speed-val').innerText = Math.round(pos.coords.speed * 3.6);
                } else {
                    document.getElementById('speed-val').innerText = "0";
                }
            }, null, { enableHighAccuracy: true });
        }

        // Déverrouillage auto si on touche la carte
        map.on('dragstart', () => { isLocked = false; });

        // Bouton de recentrage
        recenterBtn.addEventListener('click', () => {
            isLocked = true;
            map.easeTo({ center: userPos, zoom: 17, pitch: 60, duration: 1000 });
        });

        startBtn.addEventListener('click', init);
    </script>
</body>
</html>
