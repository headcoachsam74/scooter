<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kaabo Dashboard Pro QC</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Header avec Vitesse et Stats */
        .dashboard-header {
            padding: 15px;
            text-align: center;
            background: #000;
            border-bottom: 2px solid #ff3e3e;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        #speed {
            font-size: 80px;
            font-weight: bold;
            color: #ff3e3e;
            margin: 0;
            line-height: 1;
        }

        .unit { font-size: 14px; color: #888; margin-bottom: 10px; letter-spacing: 2px; }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }

        .stat-box { 
            background: #1a1a1a; 
            padding: 10px; 
            border-radius: 10px; 
            border: 1px solid #333;
        }

        .label { font-size: 9px; color: #888; text-transform: uppercase; margin-bottom: 4px; }
        .value { font-size: 18px; font-weight: bold; }
        .accent { color: #00d4ff; } /* Couleur pour la météo */

        /* Conteneur de la Carte */
        #map {
            flex-grow: 1;
            width: 100%;
            background: #111;
        }

        /* Filtre Mode Sombre pour Leaflet */
        .leaflet-tile-container {
            filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
        }

<body>

    <div class="dashboard-header">
        <div class="label">Vitesse</div>
        <div id="speed">0</div>
        <div class="unit">KM/H</div>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="label">Distance</div>
                <div id="dist" class="value">0.0</div>
                <div class="label" style="font-size: 8px;">KM</div>
            </div>
            <div class="stat-box">
                <div class="label">Altitude</div>
                <div id="alt" class="value">--</div>
                <div class="label" style="font-size: 8px;">M</div>
            </div>
            <div class="stat-box">
                <div class="label">Météo</div>
                <div id="temp" class="value accent">--</div>
                <div id="weather-desc" class="label" style="font-size: 8px;">Chargement...</div>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <script>
        let totalDist = 0;
        let lastPos = null;
        let map, marker;

        // 1. Initialisation de la carte
        function initMap() {
            // Centré par défaut sur Montréal/Québec le temps du fix GPS
            map = L.map('map', { 
                zoomControl: false, 
                attributionControl: false 
            }).setView([45.5017, -73.5673], 15);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            // Icône du marqueur (Point rouge Kaabo)
            const redIcon = L.divIcon({
                className: 'custom-div-icon',
                html: "<div style='background-color:#ff3e3e; width:14px; height:14px; border-radius:50%; border:2px solid white; box-shadow: 0 0 10px rgba(255,62,62,0.8);'></div>",
                iconSize: [14, 14],
                iconAnchor: [7, 7]
            });

            marker = L.marker([45.5017, -73.5673], {icon: redIcon}).addTo(map);
        }

        // 2. Récupération de la Météo

            try {
                // Utilisation de l'API Open-Meteo (Gratuit, pas de clé nécessaire)
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`;
                const response = await fetch(url);
                const data = await response.json();
                
                const temperature = Math.round(data.current_weather.temperature);
                document.getElementById('temp').innerText = temperature + "°C";
                document.getElementById('weather-desc').innerText = "En direct";
            } catch (error) {
                console.error("Erreur météo:", error);
                document.getElementById('temp').innerText = "??";
                document.getElementById('weather-desc').innerText = "Erreur Connexion";
            }
        }
