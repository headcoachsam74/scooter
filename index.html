<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kaabo Dashboard Pro QC</title>
    
    <link rel="stylesheet" href="https://unpkg.com" />
    
    <style>
        body { font-family: 'Inter', Arial, sans-serif; margin: 0; background-color: #000; color: #fff; overflow: hidden; height: 100vh; }
        
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
        }
        .btn-start {
            padding: 25px 50px; font-size: 22px; background: #ff3b30; color: white;
            border: none; border-radius: 12px; cursor: pointer; font-weight: 900; text-transform: uppercase;
        }

        #main-content { display: flex; flex-direction: column; height: 100vh; width: 100vw; }

        /* SECTION STATS */
        .top-section { background: #000; padding: 10px; display: flex; flex-direction: column; justify-content: center; }
        .vitesse-container { text-align: center; margin-bottom: 5px; }
        .vitesse-label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 2px; }
        .vitesse-value { font-size: 100px; font-weight: 800; color: #ff3b30; line-height: 0.8; margin: 5px 0; }
        .vitesse-unit { font-size: 14px; color: #555; text-transform: uppercase; }

        .stats-row { display: flex; justify-content: space-between; gap: 8px; }
        .stat-card { 
            background: #121212; flex: 1; padding: 12px 5px; border-radius: 10px; 
            border: 1px solid #1c1c1c; text-align: center;
        }
        .stat-label { font-size: 9px; color: #666; text-transform: uppercase; margin-bottom: 4px; }
        .stat-value { font-size: 24px; font-weight: 800; color: #fff; }
        .stat-sub { font-size: 10px; color: #555; font-weight: bold; }

        .separator { height: 4px; background: #ff3b30; width: 100%; z-index: 10; box-shadow: 0 0 15px #ff3b30; }

        /* CARTE ET LOGO */
        #map-container { position: relative; flex-grow: 1; width: 100%; overflow: hidden; background: #ddd; }
        
        /* Rotation de la carte */
        #map { 
            width: 100%; height: 100%; 
            transition: transform 0.2s linear; /* Rotation fluide */
        }

        .map-logo {
            position: absolute; bottom: 15px; right: 15px;
            width: 120px; z-index: 1000; filter: drop-shadow(0 0 5px rgba(0,0,0,0.5));
            pointer-events: none;
        }

        /* MODE PAYSAGE */
        @media (orientation: landscape) {
            #main-content { flex-direction: row; }
            .top-section { width: 35%; height: 100%; border-right: 3px solid #ff3b30; }
            .vitesse-value { font-size: 110px; }
            .stats-row { flex-direction: column; gap: 10px; }
            .separator { display: none; }
            #map-container { width: 65%; height: 100%; }
        }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="color:white; font-style: italic; letter-spacing: 5px;">KAABO PRO QC</h1>
    <button class="btn-start" onclick="startApp()">DÉMARRER</button>
</div>

<div id="main-content">
    <div class="top-section">
        <div class="vitesse-container">
            <div class="vitesse-label">VITESSE</div>
            <div class="vitesse-value" id="speed">0</div>
            <div class="vitesse-unit">KM/H</div>
        </div>
        <div class="stats-row">
            <div class="stat-card">
                <span class="stat-label">DISTANCE</span>
                <div><span class="stat-value" id="distance">0.0</span><span class="stat-sub">KM</span></div>
            </div>
            <div class="stat-card">
                <span class="stat-label">ALTITUDE</span>
                <div><span class="stat-value" id="altitude">--</span><span class="stat-sub">M</span></div>
            </div>
            <div class="stat-card">
                <span class="stat-label">MÉTÉO</span>
                <span class="stat-value" id="temp">--°</span>
            </div>
        </div>
    </div>
    
    <div class="separator"></div>
    
    <div id="map-container">
        <div id="map"></div>
        <img src="logo-kaabo.png" class="map-logo" alt="Logo">
    </div>
</div>

<script src="https://unpkg.com"></script>

<script>
    let map, marker, totalDist = 0, lastPos = null;
    let wakeLock = null;
    const apiKey = "2363a4d3b8b7a54f0eab1c09d32c8c8e";

    async function requestWakeLock() {
        try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
    }

    function startApp() {
        document.getElementById('overlay').style.display = 'none';
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        requestWakeLock();
        initMap();
        initGPS();
        getWeather();
    }

    function initMap() {
        // Utilisation de "Positron" (Gris clair haute visibilité) au lieu de "Dark"
        map = L.map('map', { 
            zoomControl: false, 
            attributionControl: false,
            rotate: true 
        }).setView([45.5017, -73.5673], 18);

        L.tileLayer('https://{s}://{z}/{x}/{y}{r}.png').addTo(map);

        // Marqueur avec une bordure noire pour qu'il "pop" sur le gris
        marker = L.circleMarker([45.5017, -73.5673], { 
            color: '#000', weight: 2, fillColor: '#ff3b30', fillOpacity: 1, radius: 10 
        }).addTo(map);
        
        window.addEventListener('resize', () => { setTimeout(() => { map.invalidateSize(); }, 200); });
    }

    function initGPS() {
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition((p) => {
                const speedKmh = Math.round((p.coords.speed || 0) * 3.6);
                const alt = Math.round(p.coords.altitude || 0);
                const lat = p.coords.latitude;
                const lon = p.coords.longitude;
                const heading = p.coords.heading; // Direction du mouvement

                document.getElementById('speed').innerText = speedKmh;
                document.getElementById('altitude').innerText = (alt != 0) ? alt : "--";
                
                const curPos = [lat, lon];
                marker.setLatLng(curPos);
                map.panTo(curPos);

                // Rotation de la carte selon le mouvement (seulement si on roule)
                if (heading !== null && speedKmh > 2) {
                    document.getElementById('map').style.transform = `rotate(${-heading}deg)`;
                }

                if (lastPos) {
                    const d = map.distance(lastPos, curPos);
                    totalDist += d / 1000;
                    document.getElementById('distance').innerText = totalDist.toFixed(1);
                }
                lastPos = curPos;
            }, null, { enableHighAccuracy: true, maximumAge: 0 });
        }
    }

    async function getWeather() {
        try {
            const res = await fetch(`https://openweathermap.org{apiKey}&units=metric&lang=fr`);
            const d = await res.json();
            if(d.main) document.getElementById('temp').innerText = Math.round(d.main.temp) + "°";
        } catch(e) {}
    }
</script>

</body>
</html>
