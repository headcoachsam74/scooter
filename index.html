<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kaabo Dashboard Odo</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
        
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; background: #1a1a1a; }

        /* La Cartouche */
        #top-bar {
            position: absolute; top: 10px; left: 10px; right: 10px;
            height: 140px; z-index: 10;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr;
            align-items: center;
            padding: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .side-info { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; color: #888; font-weight: bold; font-size: 12px; text-transform: uppercase; }
        .side-info span { color: #fff; font-size: 18px; font-variant-numeric: tabular-nums; }

        #speedometer { text-align: center; border-left: 1px solid #333; border-right: 1px solid #333; height: 80%; display: flex; flex-direction: column; justify-content: center; }
        .mini-logo { width: 60px; margin: 0 auto 2px; }
        #speed-val { font-size: 55px; font-weight: 900; color: #ff0000; line-height: 1; }
        .unit { font-size: 12px; color: #666; letter-spacing: 2px; font-weight: 800; }

        /* Bouton Reset Odo */
        .reset-btn {
            background: #333; color: #fff; border: none; padding: 4px 10px;
            border-radius: 10px; font-size: 10px; margin-top: 5px; cursor: pointer;
        }
        .reset-btn:active { background: #ff0000; }

        /* Modale Météo */
        #weather-modal {
            display: none; position: fixed; inset: 0; z-index: 3000;
            background: rgba(0,0,0,0.9); align-items: center; justify-content: center;
        }
        .modal-content {
            background: #111; padding: 25px; border-radius: 30px; width: 85%; max-width: 350px;
            border: 1px solid #ff0000; text-align: center; color: white;
        }
        .forecast-container { display: flex; overflow-x: auto; gap: 12px; margin: 20px 0; padding-bottom: 10px; }
        .forecast-item { min-width: 60px; background: #1a1a1a; padding: 10px; border-radius: 15px; border: 1px solid #333; }
        .forecast-temp { font-weight: bold; color: #ff0000; }
        .close-modal { margin-top: 10px; padding: 12px 40px; background: #ff0000; border: none; border-radius: 25px; color: white; font-weight: bold; }

        /* Écran de démarrage */
        #start-screen { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .main-logo { width: 250px; margin-bottom: 40px; }
        #start-btn { padding: 20px 60px; background: #ff0000; color: white; border: none; border-radius: 50px; font-size: 22px; font-weight: 900; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="start-screen">
        <img src="logo-kaboo.png" class="main-logo" alt="KAABO" onerror="this.style.display='none';">
        <button id="start-btn" onclick="startApp()">DÉMARRER</button>
    </div>

    <div id="top-bar">
        <div class="side-info" onclick="openWeather()">
            MÉTÉO
            <span id="temp-val">--°</span>
        </div>
        
        <div id="speedometer">
            <img src="logo-kaboo.png" class="mini-logo" alt="logo" onerror="this.style.display='none';">
            <span id="speed-val">0</span>
            <span class="unit">KM/H</span>
        </div>

        <div class="side-info">
            DISTANCE
            <span id="odo-val">0.00</span>
            <button class="reset-btn" onclick="resetOdo()">RESET</button>
        </div>
    </div>

    <div id="weather-modal" onclick="closeWeather()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 style="margin:0">PRÉVISIONS</h3>
            <div id="forecast-list" class="forecast-container"></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
                <div style="background:#1a1a1a; padding:10px; border-radius:15px; font-size:12px; border: 1px solid #222;">🌬️ Vent<br><b id="meteo-wind">--</b></div>
                <div style="background:#1a1a1a; padding:10px; border-radius:15px; font-size:12px; border: 1px solid #222;">🌡️ Ressenti<br><b id="meteo-app">--</b></div>
            </div>
            <button class="close-modal" onclick="closeWeather()">RETOUR</button>
        </div>
    </div>

    <div id="map"></div>

    <script>
        let map, marker, userPos = null;
        let lastPos = null;
        let totalDistance = parseFloat(localStorage.getItem('kaabo_odo')) || 0;
        let lastWeatherUpdate = 0;

        function initMap() {
            if (typeof google === 'undefined') return;
            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: 45.5, lng: -73.5 }, zoom: 19, tilt: 60, heading: 0,
                disableDefaultUI: true, gestureHandling: "none", mapId: "90f87356969d889"
            });
            marker = new google.maps.Marker({
                position: { lat: 45.5, lng: -73.5 }, map: map,
                icon: {
                    path: google.maps.SymbolPath.CIRCLE,
                    scale: 14, fillColor: "#ff0000", fillOpacity: 1,
                    strokeWeight: 4, strokeColor: "#ffffff"
                }
            });
            document.getElementById('odo-val').innerText = totalDistance.toFixed(2);
        }

        async function startApp() {
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(() => {});
            document.getElementById('start-screen').style.display = 'none';
            if ('wakeLock' in navigator) { try { await navigator.wakeLock.request('screen'); } catch (err) {} }
            
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const res = await DeviceOrientationEvent.requestPermission();
                    if (res === 'granted') window.addEventListener('deviceorientation', handleRotation, true);
                } catch(e) {}
            } else {
                window.addEventListener('deviceorientation', handleRotation, true);
            }
            activateGPS();
        }

        function handleRotation(e) {
            let heading = e.webkitCompassHeading || (360 - e.alpha);
            if (heading && map) map.setHeading(heading);
        }

        function activateGPS() {
            navigator.geolocation.watchPosition((p) => {
                userPos = { lat: p.coords.latitude, lng: p.coords.longitude };
                const speed = (p.coords.speed || 0) * 3.6;
                
                // Calcul de la distance
                if (lastPos && speed > 0.5) { // On ne compte que si on bouge vraiment
                    const dist = haversineDistance(lastPos, userPos);
                    totalDistance += dist;
                    localStorage.setItem('kaabo_odo', totalDistance);
                    document.getElementById('odo-val').innerText = totalDistance.toFixed(2);
                }
                lastPos = userPos;

                if (marker) marker.setPosition(userPos);
                if (map) {
                    map.setCenter(userPos);
                    map.setZoom(speed > 30 ? 17 : 19);
                }
                
                document.getElementById('speed-val').innerText = Math.round(speed);
                if (Date.now() - lastWeatherUpdate > 600000) { fetchWeather(); lastWeatherUpdate = Date.now(); }
            }, null, { enableHighAccuracy: true });
        }

        // Formule mathématique pour la distance entre deux points GPS
        function haversineDistance(p1, p2) {
            const R = 6371; // Rayon de la Terre en km
            const dLat = (p2.lat - p1.lat) * Math.PI / 180;
            const dLon = (p2.lng - p1.lng) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(p1.lat * Math.PI / 180) * Math.cos(p2.lat * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function resetOdo() {
            if(confirm("Réinitialiser le trajet ?")) {
                totalDistance = 0;
                localStorage.setItem('kaabo_odo', 0);
                document.getElementById('odo-val').innerText = "0.00";
            }
        }

        async function fetchWeather() {
            if(!userPos) return;
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${userPos.lat}&longitude=${userPos.lng}&current_weather=true&hourly=temperature_2m,weathercode,apparent_temperature&forecast_days=1`);
                const data = await res.json();
                document.getElementById('temp-val').innerText = Math.round(data.current_weather.temperature) + "°";
                document.getElementById('meteo-wind').innerText = Math.round(data.current_weather.windspeed) + " km/h";
                document.getElementById('meteo-app').innerText = Math.round(data.hourly.apparent_temperature[0]) + "°C";

                const list = document.getElementById('forecast-list');
                list.innerHTML = "";
                const currentHour = new Date().getHours();
                for(let i = currentHour + 1; i < currentHour + 9; i++) {
                    const idx = i > 23 ? i-24 : i;
                    const temp = Math.round(data.hourly.temperature_2m[i]);
                    const code = data.hourly.weathercode[i];
                    let icon = code > 50 ? "🌧️" : (code > 0 ? "☁️" : "☀️");
                    list.innerHTML += `<div class="forecast-item"><div class="forecast-time">${idx}h</div><div style="font-size:20px;">${icon}</div><div class="forecast-temp">${temp}°</div></div>`;
                }
            } catch (e) {}
        }

        function openWeather() { document.getElementById('weather-modal').style.display = 'flex'; }
        function closeWeather() { document.getElementById('weather-modal').style.display = 'none'; }
    </script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBN-m4BiC0T71ftObq197Esiu9o9k925ig&callback=initMap" async defer></script>
</body>
</html>
