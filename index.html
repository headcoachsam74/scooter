<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kaabo Dashboard Pro QC - Ultra</title>
    
    <link rel="stylesheet" href="https://unpkg.com" />
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        :root { --primary: #ff3b30; --glow: rgba(255, 59, 48, 0.6); --bg: #000; }
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: var(--bg); color: #fff; overflow: hidden; }
        
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;
        }
        .btn-start {
            padding: 20px 60px; font-size: 24px; font-family: 'Orbitron'; background: var(--primary); color: white;
            border: none; border-radius: 50px; cursor: pointer; font-weight: 900; 
            box-shadow: 0 0 30px var(--glow); transition: 0.3s;
        }

        /* TOP DASHBOARD */
        .top-section { background: #000; padding: 10px; }
        
        /* Battery Bar */
        .battery-container { height: 6px; background: #222; border-radius: 3px; margin: 5px 15px 15px; overflow: hidden; }
        #battery-level { height: 100%; width: 100%; background: linear-gradient(90deg, #ff3b30, #ff9f0a); transition: width 0.5s; }

        .vitesse-container { text-align: center; position: relative; }
        .vitesse-label { font-size: 10px; color: #444; font-family: 'Orbitron'; letter-spacing: 3px; }
        .vitesse-value { 
            font-size: 130px; font-weight: 900; color: var(--primary); line-height: 0.8; 
            font-family: 'Orbitron'; text-shadow: 0 0 25px var(--glow); margin: 5px 0;
        }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 0 10px; margin-top: 10px; }
        .stat-card { 
            background: linear-gradient(145deg, #121212, #080808); padding: 12px 5px; 
            border-radius: 12px; border: 1px solid #1c1c1c; text-align: center;
        }
        .stat-label { font-size: 9px; color: #666; text-transform: uppercase; margin-bottom: 4px; display: block; }
        .stat-value { font-size: 24px; font-weight: 800; color: #fff; }
        .stat-sub { font-size: 10px; color: #444; margin-left: 2px; }

        .separator { height: 2px; background: var(--primary); box-shadow: 0 0 15px var(--glow); z-index: 10; }

        /* MAP AREA */
        #map-container { position: relative; flex-grow: 1; width: 100%; height: 40vh; }
        #map { width: 100%; height: 100%; filter: grayscale(1) invert(1) contrast(1.2); }

        .map-logo {
            position: absolute; bottom: 20px; right: 15px; width: 180px; 
            z-index: 1000; filter: drop-shadow(0 0 10px rgba(0,0,0,0.8)); opacity: 0.8;
        }
    </style>
</head>
<body>

<div id="overlay">
    <div style="font-family: 'Orbitron'; font-size: 40px; color: #fff; margin-bottom: 30px;">KAABO <span style="color: var(--primary)">PRO</span></div>
    <button class="btn-start" onclick="startApp()">START RIDE</button>
</div>

<div id="main-content" style="display: flex; flex-direction: column; height: 100vh;">
    <div class="top-section">
        <div class="battery-container"><div id="battery-level"></div></div>
        
        <div class="vitesse-container">
            <div class="vitesse-label">SPEED</div>
            <div class="vitesse-value" id="speed">0</div>
            <div style="color:#444; font-size: 14px; font-family: 'Orbitron';">KM/H</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><span class="stat-label">DIST.</span><span class="stat-value" id="distance">0.0</span><span class="stat-sub">KM</span></div>
            <div class="stat-card"><span class="stat-label">MAX</span><span class="stat-value" id="max-speed" style="color: #ff9f0a;">0</span><span class="stat-sub">KM/H</span></div>
            <div class="stat-card"><span class="stat-label">TIME</span><span class="stat-value" id="timer" style="font-size: 18px;">00:00</span></div>
            <div class="stat-card"><span class="stat-label">ALT.</span><span class="stat-value" id="altitude">--</span><span class="stat-sub">M</span></div>
            <div class="stat-card"><span class="stat-label">TEMP.</span><span class="stat-value" id="temp">--°</span></div>
            <div class="stat-card"><span class="stat-label">HEADING</span><span class="stat-value" id="heading">--</span><span class="stat-sub">°</span></div>
        </div>
    </div>
    
    <div class="separator"></div>
    
    <div id="map-container">
        <div id="map"></div>
        <img src="logo-kaabo.png" class="map-logo" alt="Kaabo Logo">
    </div>
</div>

<script src="https://unpkg.com"></script>

<script>
    let map, marker, totalDist = 0, lastPos = null, maxSpeed = 0, startTime = Date.now();
    let wakeLock = null;
    const apiKey = "2363a4d3b8b7a54f0eab1c09d32c8c8e";

    async function requestWakeLock() {
        try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
    }

    function startApp() {
        document.getElementById('overlay').style.display = 'none';
        const el = document.documentElement;
        if (el.requestFullscreen) el.requestFullscreen();
        requestWakeLock();
        initMap();
        initGPS();
        getWeather();
        startTimer();
        simulateBattery();
    }

    function startTimer() {
        setInterval(() => {
            let diff = Math.floor((Date.now() - startTime) / 1000);
            let m = Math.floor(diff / 60).toString().padStart(2, '0');
            let s = (diff % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${m}:${s}`;
        }, 1000);
    }

    function simulateBattery() {
        let level = 100;
        setInterval(() => {
            if(level > 15) level -= 0.1;
            document.getElementById('battery-level').style.width = level + "%";
        }, 5000);
    }

    function initMap() {
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([45.5017, -73.5673], 17);
        L.tileLayer('https://{s}://{z}/{x}/{y}{r}.png').addTo(map);
        marker = L.circleMarker([45.5017, -73.5673], { 
            color: '#ff3b30', radius: 10, fillOpacity: 1, weight: 4, fillColor: '#fff' 
        }).addTo(map);
    }

    function initGPS() {
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition((p) => {
                const speedKmh = Math.round((p.coords.speed || 0) * 3.6);
                const alt = Math.round(p.coords.altitude || 0);
                const heading = Math.round(p.coords.heading || 0);
                const lat = p.coords.latitude;
                const lon = p.coords.longitude;

                // Update Speed & Max
                document.getElementById('speed').innerText = speedKmh;
                if (speedKmh > maxSpeed) {
                    maxSpeed = speedKmh;
                    document.getElementById('max-speed').innerText = maxSpeed;
                }

                document.getElementById('altitude').innerText = (alt != 0) ? alt : "--";
                document.getElementById('heading').innerText = (heading != 0) ? heading : "--";
                
                const curPos = [lat, lon];
                marker.setLatLng(curPos);
                
                // Rotation de la carte vers la direction (Heading)
                map.setView(curPos, 17, { animate: true });
                if(heading) document.getElementById('map').style.transform = `rotate(${-heading}deg)`;

                if (lastPos) {
                    const d = map.distance(lastPos, curPos);
                    totalDist += d / 1000;
                    document.getElementById('distance').innerText = totalDist.toFixed(2);
                }
                lastPos = curPos;
            }, null, { enableHighAccuracy: true, maximumAge: 1000 });
        }
    }

    async function getWeather() {
        try {
            const res = await fetch(`https://openweathermap.org{apiKey}&units=metric&lang=fr`);
            const d = await res.json();
            if(d.main) document.getElementById('temp').innerText = Math.round(d.main.temp) + "°";
        } catch(e) {}
    }
</script>

</body>
</html>
