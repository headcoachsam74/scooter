<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kaabo Dash</title>
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100svh; 
            background: #000; overflow: hidden; overscroll-behavior: none;
            font-family: sans-serif; color: white;
        }

        #map { position: absolute; inset: 0; z-index: 1; background: #1a1a1a; }

        /* Top Bar */
        #top-bar {
            position: absolute; top: 15px; left: 10px; right: 10px; height: 110px; z-index: 10;
            background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-radius: 20px; display: grid; grid-template-columns: 1fr 1.2fr 1fr; align-items: center; 
            text-align: center; border: 1px solid rgba(255,255,255,0.1);
        }

        #speed-val { font-size: 50px; font-weight: 900; color: #ff0000; display: block; line-height: 1; }
        .label { font-size: 10px; color: #666; text-transform: uppercase; }
        .val { font-size: 18px; font-weight: bold; }

        /* Start Screen */
        #start-screen { 
            position: fixed; inset: 0; background: #000; z-index: 2000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .logo-container { text-align: center; margin-bottom: 30px; }
        .main-logo { width: 250px; height: auto; display: block; }
        
        #start-btn { 
            padding: 20px 60px; background: #ff0000; color: white; border: none; 
            border-radius: 50px; font-size: 20px; font-weight: bold; cursor: pointer;
        }

        #weather-modal { 
            display: none; position: fixed; inset: 0; z-index: 3000; 
            background: rgba(0,0,0,0.9); align-items: center; justify-content: center; 
        }
        .modal-content { background: #111; padding: 20px; border-radius: 20px; width: 80%; border: 1px solid #ff0000; text-align: center; }
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="logo-container">
            <img src="logo-kaboo.png" class="main-logo" alt="KAABO" onerror="this.style.display='none'; document.getElementById('fallback-text').style.display='block';">
            <h1 id="fallback-text" style="display:none; color:red; letter-spacing:10px; margin:0;">KAABO</h1>
        </div>
        <button id="start-btn" onclick="startApp()">DÉMARRER</button>
    </div>

    <div id="top-bar">
        <div onclick="openWeather()" style="cursor:pointer">
            <div class="label">Météo</div>
            <div id="temp-val" class="val">--°</div>
        </div>
        <div>
            <span id="speed-val">0</span>
            <div class="label">KM/H</div>
        </div>
        <div>
            <div class="label">Trip</div>
            <div id="odo-val" class="val">0.00</div>
            <button onclick="resetOdo()" style="background:#333;color:white;border:none;border-radius:4px;font-size:8px;padding:2px 5px;cursor:pointer">RESET</button>
        </div>
    </div>

    <div id="weather-modal" onclick="closeWeather()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 style="color:#ff0000">PRÉVISIONS</h3>
            <div id="forecast-list" style="display:flex; overflow-x:auto; gap:10px; margin:15px 0; padding-bottom:10px;"></div>
            <button onclick="closeWeather()" style="background:#ff0000; color:white; border:none; padding:10px 20px; border-radius:10px; cursor:pointer">FERMER</button>
        </div>
    </div>

    <div id="map"></div>

    <script>
        let map, marker, userPos = { lat: 45.5, lng: -73.5 }, lastPos = null;
        let totalDistance = parseFloat(localStorage.getItem('kaabo_odo')) || 0;

        function initMap() {
            try {
                map = new google.maps.Map(document.getElementById("map"), {
                    center: userPos, 
                    zoom: 18, 
                    tilt: 60, 
                    disableDefaultUI: true, 
                    mapId: "90f87356969d889"
                });
                
                marker = new google.maps.Marker({
                    position: userPos, 
                    map: map,
                    icon: { 
                        path: google.maps.SymbolPath.CIRCLE, 
                        scale: 10, 
                        fillColor: "#ff0000", 
                        fillOpacity: 1, 
                        strokeWeight: 2, 
                        strokeColor: "#fff" 
                    }
                });
                document.getElementById('odo-val').innerText = totalDistance.toFixed(2);
            } catch (e) {
                console.error("Erreur Maps:", e);
            }
        }

        async function startApp() {
            document.getElementById('start-screen').style.display = 'none';
            
            // Demande plein écran
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(() => {});
            }

            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((p) => {
                    const newPos = { lat: p.coords.latitude, lng: p.coords.longitude };
                    const speed = (p.coords.speed || 0) * 3.6;
                    
                    document.getElementById('speed-val').innerText = Math.round(speed);
                    
                    if (lastPos && speed > 1) {
                        const dist = haversine(lastPos, newPos);
                        totalDistance += dist;
                        localStorage.setItem('kaabo_odo', totalDistance);
                        document.getElementById('odo-val').innerText = totalDistance.toFixed(2);
                    }
                    lastPos = newPos;
                    
                    if (marker) marker.setPosition(newPos);
                    if (map) { 
                        map.setCenter(newPos);
                        if (p.coords.heading) map.setHeading(p.coords.heading);
                    }
                }, (err) => console.error("GPS Error:", err), { enableHighAccuracy: true });
            }
            fetchWeather();
        }

        function haversine(p1, p2) {
            const R = 6371;
            const dLat = (p2.lat - p1.lat) * Math.PI / 180;
            const dLon = (p2.lng - p1.lng) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(p1.lat*Math.PI/180)*Math.cos(p2.lat*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        async function fetchWeather() {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${userPos.lat}&longitude=${userPos.lng}&current_weather=true&hourly=temperature_2m&forecast_days=1`);
                const data = await res.json();
                document.getElementById('temp-val').innerText = Math.round(data.current_weather.temperature) + "°";
                
                const list = document.getElementById('forecast-list');
                list.innerHTML = "";
                const h = new Date().getHours();
                for(let i=h+1; i<h+7; i++) {
                    const temp = Math.round(data.hourly.temperature_2m[i%24]);
                    list.innerHTML += `<div style="min-width:55px;">${i%24}h<br>☀️<br><b>${temp}°</b></div>`;
                }
            } catch(e) {
                console.error("Météo Error:", e);
            }
        }

        function resetOdo() { 
            if(confirm("Réinitialiser la distance ?")) {
                totalDistance = 0; 
                localStorage.setItem('kaabo_odo', 0); 
                document.getElementById('odo-val').innerText = "0.00"; 
            }
        }
        
        function openWeather() { document.getElementById('weather-modal').style.display = 'flex'; }
        function closeWeather() { document.getElementById('weather-modal').style.display = 'none'; }
    </script>
    
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBN-m4BiC0T71ftObq197Esiu9o9k925ig&callback=initMap" async defer></script>
</body>
</html>
