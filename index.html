<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kaabo Dashboard Pro</title>
    
    <!-- Liens CDN complets et sécurisés -->
    <script src="https://unpkg.com"></script>
    <link href="https://unpkg.com" rel="stylesheet" />
    
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: sans-serif; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; background: #222; }
        
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #logo-start { width: 180px; height: auto; margin-bottom: 40px; }
        #start-btn {
            padding: 20px 50px; background: #ff0000; color: white;
            border: none; border-radius: 5px; font-size: 20px; font-weight: bold; cursor: pointer;
        }

        .widget {
            position: absolute; z-index: 10; background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px); padding: 10px; border-radius: 15px; text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.4);
        }

        #main-dash { min-width: 130px; display: flex; flex-direction: column; align-items: center; }
        #logo-kaabo { width: 80px; height: auto; margin-bottom: 5px; }
        #speed-val { font-size: 52px; font-weight: 900; color: #ff0000; line-height: 0.9; }

        @media (orientation: portrait) {
            #main-dash { top: 20px; left: 50%; transform: translateX(-50%); }
            #weather { top: 20px; left: 15px; }
            #elevation { bottom: 120px; left: 15px; }
        }
        @media (orientation: landscape) {
            #main-dash { top: 15px; right: 15px; }
            #weather { top: 15px; left: 15px; }
            #elevation { bottom: 25px; left: 15px; }
        }

        #recenter-btn {
            position: absolute; bottom: 30px; right: 20px; z-index: 20;
            width: 60px; height: 60px; background: #ff0000; border: 2px solid white; border-radius: 50%; color: white; font-size: 28px;
        }
        .nav-arrow { width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-bottom: 22px solid #ff0000; }
    </style>
</head>
<body>
    <div id="start-screen">
        <img src="logo-kaboo.png" id="logo-start" alt="Kaabo" onerror="this.style.display='none'">
        <button id="start-btn" onclick="startApp()">DÉMARRER LE GPS</button>
    </div>

    <div id="weather" class="widget">☀️ <span id="temp-val">--</span>°C</div>
    <div id="main-dash" class="widget">
        <img src="logo-kaboo.png" id="logo-kaabo" alt="Logo" onerror="this.style.display='none'">
        <span id="speed-val">0</span>
        <span style="font-size: 11px; font-weight: bold;">KM/H</span>
    </div>
    <div id="elevation" class="widget"><span style="font-size: 9px; color:#666; display:block; font-weight: bold;">ALTITUDE</span><span id="alt-val">--</span> m</div>

    <button id="recenter-btn" onclick="recenter()">🎯</button>
    <div id="map"></div>

    <script>
        let userPos = [2.3522, 48.8566];
        let isLocked = true;
        let map;

        // Création de la carte au démarrage
        function initMap() {
            try {
                map = new maplibregl.Map({
                    container: 'map',
                    style: 'https://cartocdn.com', 
                    center: userPos, zoom: 17, pitch: 65, bearing: 0, antialias: true
                });

                const el = document.createElement('div'); el.className = 'nav-arrow';
                const marker = new maplibregl.Marker({element: el}).setLngLat(userPos).addTo(map);
                
                map.on('dragstart', () => isLocked = false);
            } catch (e) {
                alert("Erreur de carte : " + e.message);
            }
        }

        async function startApp() {
            // Mode Plein Écran
            try {
                const doc = document.documentElement;
                if (doc.requestFullscreen) doc.requestFullscreen();
                else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
            } catch(e) {}

            // Permission Rotation (iOS)
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                const res = await DeviceOrientationEvent.requestPermission();
                if (res === 'granted') window.addEventListener('deviceorientation', handleRotation, true);
            } else {
                window.addEventListener('deviceorientation', handleRotation, true);
            }

            initMap();
            activateGPS();
            document.getElementById('start-screen').style.display = 'none';
        }

        function handleRotation(e) {
            let heading = e.webkitCompassHeading || (360 - e.alpha);
            if (heading && isLocked && map) map.setBearing(heading);
        }

        function activateGPS() {
            navigator.geolocation.watchPosition((p) => {
                userPos = [p.coords.longitude, p.coords.latitude];
                if (isLocked && map) map.easeTo({ center: userPos, duration: 600 });
                document.getElementById('speed-val').innerText = Math.round((p.coords.speed || 0) * 3.6);
                if (p.coords.altitude !== null) document.getElementById('alt-val').innerText = Math.round(p.coords.altitude);
                fetchWeather();
            }, (err) => alert("GPS Erreur: " + err.message), { enableHighAccuracy: true });
        }

        async function fetchWeather() {
            try {
                const res = await fetch(`https://open-meteo.com{userPos[1]}&longitude=${userPos[0]}&current_weather=true`);
                const data = await res.json();
                document.getElementById('temp-val').innerText = Math.round(data.current_weather.temperature);
            } catch (e) {}
        }

        function recenter() { isLocked = true; if(map) map.resize(); if(map) map.easeTo({ center: userPos, zoom: 17, pitch: 65 }); }
        window.addEventListener('resize', () => { if(map) map.resize(); });
    </script>
</body>
</html>
