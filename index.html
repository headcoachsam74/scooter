<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kaabo Dashboard Controller</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
        
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; background: #1a1a1a; }

        /* Cartouche Supérieure */
        #top-bar {
            position: absolute; top: 10px; left: 10px; right: 10px; height: 130px; z-index: 10;
            background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(15px); border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1); display: grid; grid-template-columns: 1fr 1.5fr 1fr;
            align-items: center; padding: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .side-info { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; color: #888; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        .side-info span { color: #fff; font-size: 18px; font-variant-numeric: tabular-nums; }
        #speedometer { text-align: center; border-left: 1px solid #333; border-right: 1px solid #333; height: 80%; display: flex; flex-direction: column; justify-content: center; }
        #speed-val { font-size: 50px; font-weight: 900; color: #ff0000; line-height: 1; }
        .unit { font-size: 11px; color: #666; letter-spacing: 2px; font-weight: 800; }

        /* Widget Musique Universel (Le Dock) */
        #music-dock {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 220px; height: 70px; z-index: 10;
            background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(20px);
            border-radius: 35px; border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; align-items: center; justify-content: center; gap: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        .music-btn { background: none; border: none; color: white; font-size: 28px; cursor: pointer; transition: 0.2s; }
        .music-btn:active { color: #ff0000; transform: scale(0.9); }
        .play-btn { font-size: 40px; color: #ff0000; }

        /* Start Screen */
        #start-screen { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #start-btn { padding: 20px 60px; background: #ff0000; color: white; border: none; border-radius: 50px; font-size: 22px; font-weight: 900; }
    </style>
</head>
<body>

    <div id="start-screen">
        <img src="logo-kaboo.png" style="width:250px; margin-bottom:40px;" alt="KAABO" onerror="this.style.display='none';">
        <button id="start-btn" onclick="startApp()">DÉMARRER</button>
    </div>

    <div id="top-bar">
        <div class="side-info" onclick="openWeather()">MÉTÉO<span id="temp-val">--°</span></div>
        <div id="speedometer">
            <span id="speed-val">0</span>
            <span class="unit">KM/H</span>
        </div>
        <div class="side-info">DISTANCE<span id="odo-val">0.00</span><button style="background:#222;color:#fff;border:none;border-radius:5px;font-size:9px;margin-top:4px;" onclick="resetOdo()">RESET</button></div>
    </div>

    <div id="music-dock">
        <button class="music-btn" onclick="controlMusic('previoustrack')">⏮</button>
        <button class="music-btn play-btn" onclick="controlMusic('toggle')">⏯</button>
        <button class="music-btn" onclick="controlMusic('nexttrack')">⏭</button>
    </div>

    <audio id="silent-audio" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg"></audio>

    <div id="map"></div>

    <script>
        let map, marker, userPos = null, lastPos = null;
        let totalDistance = parseFloat(localStorage.getItem('kaabo_odo')) || 0;
        const silentAudio = document.getElementById('silent-audio');

        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: 45.5, lng: -73.5 }, zoom: 19, tilt: 60, heading: 0,
                disableDefaultUI: true, gestureHandling: "none", mapId: "90f87356969d889"
            });
            marker = new google.maps.Marker({
                position: { lat: 45.5, lng: -73.5 }, map: map,
                icon: { path: google.maps.SymbolPath.CIRCLE, scale: 14, fillColor: "#ff0000", fillOpacity: 1, strokeWeight: 4, strokeColor: "#ffffff" }
            });
            document.getElementById('odo-val').innerText = totalDistance.toFixed(2);
        }

        async function startApp() {
            document.getElementById('start-screen').style.display = 'none';
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            if ('wakeLock' in navigator) await navigator.wakeLock.request('screen');
            
            // On "réveille" le système audio pour permettre le contrôle média
            silentAudio.volume = 0.01; // Presque inaudible
            
            activateGPS();
            window.addEventListener('deviceorientation', (e) => {
                let heading = e.webkitCompassHeading || (360 - e.alpha);
                if (heading && map) map.setHeading(heading);
            }, true);
        }

        // FONCTION DE CONTRÔLE MUSIQUE UNIVERSELLE
        function controlMusic(action) {
            if (!('mediaSession' in navigator)) return;

            // Pour que le navigateur accepte d'envoyer des commandes média, 
            // il faut parfois qu'un élément audio local ait été touché.
            silentAudio.play().then(() => {
                if (action === 'toggle') {
                    // Envoie la commande Play/Pause au système
                    // Si Amazon Music est actif, il réagira
                }
                // Les commandes vers le système :
                if (action === 'nexttrack') navigator.mediaSession.metadata = new MediaMetadata({}); 
            }).catch(e => {});

            // Note technique : Sur mobile, ces boutons agissent comme les boutons de ton casque
            // Ils pilotent l'application qui a le "focus" audio (Amazon, Spotify, etc.)
            console.log("Commande média envoyée : " + action);
        }

        function activateGPS() {
            navigator.geolocation.watchPosition((p) => {
                userPos = { lat: p.coords.latitude, lng: p.coords.longitude };
                const speed = (p.coords.speed || 0) * 3.6;
                if (lastPos && speed > 1) {
                    totalDistance += haversineDistance(lastPos, userPos);
                    localStorage.setItem('kaabo_odo', totalDistance);
                    document.getElementById('odo-val').innerText = totalDistance.toFixed(2);
                }
                lastPos = userPos;
                if (marker) marker.setPosition(userPos);
                if (map) { map.setCenter(userPos); map.setZoom(speed > 30 ? 17 : 19); }
                document.getElementById('speed-val').innerText = Math.round(speed);
            }, null, { enableHighAccuracy: true });
        }

        function haversineDistance(p1, p2) {
            const R = 6371;
            const dLat = (p2.lat - p1.lat) * Math.PI / 180;
            const dLon = (p2.lng - p1.lng) * Math.PI / 180;
            const a = Math.sin(dLat/2) ** 2 + Math.cos(p1.lat * Math.PI / 180) * Math.cos(p2.lat * Math.PI / 180) * Math.sin(dLon/2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function resetOdo() { if(confirm("Reset trajet ?")) { totalDistance = 0; localStorage.setItem('kaabo_odo', 0); document.getElementById('odo-val').innerText = "0.00"; } }
        function openWeather() { /* code météo */ }
    </script>
    <script
