<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kaabo Dashboard Pro</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
        
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; background: #1a1a1a; }
        
        /* Widgets Style */
        .widget { 
            position: absolute; z-index: 10; 
            background: rgba(15, 15, 15, 0.85); 
            backdrop-filter: blur(10px); 
            padding: 12px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.7); 
            text-align: center; border: 1px solid rgba(255,255,255,0.1);
            color: white; cursor: pointer;
        }

        #main-dash { min-width: 160px; top: 20px; left: 50%; transform: translateX(-50%); cursor: default; }
        .mini-logo { width: 80px; height: auto; display: block; margin: 0 auto 5px auto; }
        #speed-val { font-size: 65px; font-weight: 900; color: #ff0000; display: block; line-height: 0.8; }
        .unit { font-size: 14px; font-weight: 900; color: #aaa; letter-spacing: 3px; }
        
        #weather { top: 20px; left: 15px; font-size: 16px; }
        #elevation { bottom: 30px; left: 15px; font-size: 14px; }

        #lock-btn { 
            position: absolute; bottom: 30px; right: 15px; z-index: 100;
            width: 65px; height: 65px; border-radius: 50%;
            background: #ff0000; color: white; border: none;
            font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        #start-screen { 
            position: fixed; inset: 0; background: #000; z-index: 2000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .main-logo { width: 250px; height: auto; margin-bottom: 40px; }
        #start-btn { padding: 22px 70px; background: #ff0000; color: white; border: none; border-radius: 50px; font-size: 22px; font-weight: 900; }

        @media (orientation: landscape) { #main-dash { top: 15px; right: 15px; left: auto; transform: none; } }
    </style>
</head>
<body>

    <div id="start-screen">
        <img src="logo-kaboo.png" class="main-logo" alt="KAABO" onerror="this.style.display='none'; document.getElementById('fallback-text').style.display='block';">
        <h1 id="fallback-text" style="color:white; display:none; letter-spacing: 8px; margin-bottom: 40px;">KAABO</h1>
        <button id="start-btn" onclick="startApp()">DÉMARRER</button>
    </div>

    <div id="weather" class="widget">☀️ <span id="temp-val">--</span>°C</div>

    <div id="main-dash" class="widget">
        <img src="logo-kaboo.png" class="mini-logo" alt="logo" onerror="this.style.display='none';">
        <span id="speed-val">0</span>
        <span class="unit">KM/H</span>
    </div>

    <div id="elevation" class="widget">⛰️ <span id="alt-val">--</span> m</div>
    
    <button id="lock-btn" onclick="toggleLock()">🔒</button>

    <div id="map"></div>

    <script>
        let map, marker, userPos = { lat: 45.5017, lng: -73.5673 };
        let isLocked = true;

        function initMap() {
            if (typeof google === 'undefined') return;
            map = new google.maps.Map(document.getElementById("map"), {
                center: userPos, 
                zoom: 19, 
                tilt: 45, // Inclinaison type automobile
                heading: 0,
                disableDefaultUI: true, 
                gestureHandling: "greedy",
                mapId: "90f87356969d889"
            });

            // Point rouge au lieu de la flèche
            marker = new google.maps.Marker({
                position: userPos, 
                map: map,
                icon: {
                    path: google.maps.SymbolPath.CIRCLE,
                    scale: 12, 
                    fillColor: "#ff0000", 
                    fillOpacity: 1,
                    strokeWeight: 4, 
                    strokeColor: "#ffffff"
                }
            });
        }

        async function startApp() {
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(() => {});
            document.getElementById('start-screen').style.display = 'none';
            
            // Wake Lock (Écran allumé)
            if ('wakeLock' in navigator) { try { await navigator.wakeLock.request('screen'); } catch (err) {} }
            
            // Demande de permission boussole
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const res = await DeviceOrientationEvent.requestPermission();
                    if (res === 'granted') window.addEventListener('deviceorientation', handleRotation, true);
                } catch(e) {}
            } else {
                window.addEventListener('deviceorientation', handleRotation, true);
            }
            activateGPS();
        }

        function handleRotation(e) {
            // Orientation du téléphone (boussole)
            let heading = e.webkitCompassHeading || (360 - e.alpha);
            if (heading && isLocked && map) {
                // Fait tourner la carte pour pointer vers l'avant
                map.setHeading(heading);
            }
        }

        function activateGPS() {
            navigator.geolocation.watchPosition((p) => {
                userPos = { lat: p.coords.latitude, lng: p.coords.longitude };
                const speed = Math.round((p.coords.speed || 0) * 3.6);
                
                if (marker) marker.setPosition(userPos);
                
                if (isLocked && map) {
                    map.setCenter(userPos);
                    // Ajustement dynamique du zoom selon la vitesse
                    if (speed > 45) map.setZoom(16);
                    else if (speed > 25) map.setZoom(17.5);
                    else map.setZoom(19);
                }
                
                document.getElementById('speed-val').innerText = speed;
                if (p.coords.altitude !== null) document.getElementById('alt-val').innerText = Math.round(p.coords.altitude);
            }, null, { enableHighAccuracy: true });
        }

        function toggleLock() {
            isLocked = !isLocked;
            const btn = document.getElementById('lock-btn');
            btn.innerText = isLocked ? "🔒" : "🔓";
            btn.style.background = isLocked ? "#ff0000" : "#444";
        }
    </script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBN-m4BiC0T71ftObq197Esiu9o9k925ig&callback=initMap" async defer></script>
</body>
</html>
